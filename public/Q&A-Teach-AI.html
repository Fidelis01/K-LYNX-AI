<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>K-LYNX AI++ - Teach AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Open Sans',sans-serif;background:linear-gradient(135deg,#0F172A 0%,#1E293B 100%);min-height:100vh;}
        .back-btn{position:fixed;top:20px;left:20px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);padding:10px 20px;border-radius:25px;color:white;text-decoration:none;transition:0.3s;z-index:100;font-size:14px;display:flex;align-items:center;gap:8px;}
        .back-btn:hover{background:rgba(0,212,255,0.2);border-color:#00d4ff;}
        .container{max-width:900px;margin:0 auto;padding:80px 20px 40px;}
        .header-section{text-align:center;margin-bottom:30px;}
        .header-section h1{font-size:48px;background:linear-gradient(135deg,#00d4ff,#00ffaa);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:15px;}
        .header-section p{color:rgba(255,255,255,0.7);font-size:18px;}
        
        .teach-card{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border-radius:30px;padding:30px;border:1px solid rgba(0,212,255,0.3);margin-bottom:20px;}
        .section-title{color:#00d4ff;font-size:20px;margin-bottom:15px;display:flex;align-items:center;gap:10px;}
        .input-group{margin-bottom:20px;}
        .input-group label{display:block;color:rgba(255,255,255,0.9);margin-bottom:8px;font-weight:600;}
        .input-group input,.input-group textarea,.input-group select{width:100%;padding:12px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.2);border-radius:12px;color:white;font-size:14px;font-family:'Open Sans',sans-serif;}
        .input-group input:focus,.input-group textarea:focus,.input-group select:focus{outline:none;border-color:#00d4ff;}
        .input-group textarea{min-height:100px;resize:vertical;}
        
        .teach-btn{background:linear-gradient(135deg,#00d4ff,#00ffaa);color:#0F172A;padding:14px;border:none;border-radius:40px;font-size:16px;font-weight:700;cursor:pointer;transition:0.3s;width:100%;margin-top:10px;}
        .teach-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,212,255,0.3);}
        .teach-btn:disabled{opacity:0.5;cursor:not-allowed;}
        
        .response-area{background:rgba(0,0,0,0.3);border-radius:15px;padding:20px;margin-top:20px;}
        .response-text{color:rgba(255,255,255,0.9);line-height:1.6;white-space:pre-wrap;}
        .feedback-buttons{display:flex;gap:15px;margin-top:15px;justify-content:flex-end;}
        .feedback-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);padding:8px 20px;border-radius:20px;color:white;cursor:pointer;transition:0.3s;}
        .feedback-btn:hover{background:rgba(0,212,255,0.2);border-color:#00d4ff;}
        .feedback-btn.correct{background:#00ffaa;color:#0F172A;}
        
        .knowledge-list{max-height:300px;overflow-y:auto;}
        .knowledge-item{background:rgba(0,0,0,0.3);padding:12px;border-radius:10px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
        .knowledge-question{color:#00d4ff;font-weight:600;}
        .knowledge-answer{color:rgba(255,255,255,0.8);font-size:13px;margin-top:5px;}
        .delete-knowledge{background:rgba(255,68,68,0.2);border:none;color:#ff8888;padding:5px 10px;border-radius:8px;cursor:pointer;}
        
        .loading{display:none;text-align:center;padding:20px;}
        .spinner{width:40px;height:40px;border:3px solid rgba(0,212,255,0.3);border-top-color:#00d4ff;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px;}
        @keyframes spin{to{transform:rotate(360deg);}}
        
        @media (max-width:768px){.container{padding:70px 15px 30px;}.header-section h1{font-size:32px;}}
    </style>
</head>
<body>
    <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
    <div class="container">
        <div class="header-section">
            <h1>🧠 Teach AI</h1>
            <p>Help me learn! Teach me facts, answers, and knowledge that I can share with others.</p>
        </div>
        
        <div class="teach-card">
            <div class="section-title"><i class="fas fa-graduation-cap"></i> Teach Me Something New</div>
            <div class="input-group">
                <label>📝 Question / Topic</label>
                <input type="text" id="question" placeholder="e.g., What is the capital of South Africa?">
            </div>
            <div class="input-group">
                <label>💡 Correct Answer / Explanation</label>
                <textarea id="answer" placeholder="The capital of South Africa is Pretoria (administrative), Cape Town (legislative), and Bloemfontein (judicial)."></textarea>
            </div>
            <div class="input-group">
                <label>🏷️ Category (optional)</label>
                <select id="category">
                    <option value="general">General Knowledge</option>
                    <option value="science">Science</option>
                    <option value="history">History</option>
                    <option value="geography">Geography</option>
                    <option value="technology">Technology</option>
                    <option value="language">Language</option>
                    <option value="custom">Custom</option>
                </select>
            </div>
            <button class="teach-btn" id="teachBtn"><i class="fas fa-brain"></i> Teach AI</button>
        </div>
        
        <div class="teach-card">
            <div class="section-title"><i class="fas fa-question-circle"></i> Ask What I've Learned</div>
            <div class="input-group">
                <label>Ask me anything I've been taught</label>
                <input type="text" id="askQuestion" placeholder="e.g., What is the capital of South Africa?">
            </div>
            <button class="teach-btn" id="askBtn"><i class="fas fa-search"></i> Ask AI</button>
            <div id="askResponse" class="response-area" style="display:none;">
                <div class="response-text" id="responseText"></div>
                <div class="feedback-buttons">
                    <button class="feedback-btn" id="correctBtn">✓ Correct</button>
                    <button class="feedback-btn" id="incorrectBtn">✗ Incorrect</button>
                </div>
            </div>
        </div>
        
        <div class="teach-card">
            <div class="section-title"><i class="fas fa-database"></i> Knowledge Base</div>
            <div id="knowledgeList" class="knowledge-list">
                <div style="text-align:center;padding:20px;color:rgba(255,255,255,0.5);">Loading your teachings...</div>
            </div>
        </div>
        
        <div class="loading" id="loading"><div class="spinner"></div><p>Processing...</p></div>
    </div>
    
    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login.html';
        
        const AI_API = 'https://jai1-sh81.onrender.com';
        let clientId = localStorage.getItem('klynx_client_id');
        if (!clientId) {
            clientId = 'teach_' + Date.now();
            localStorage.setItem('klynx_client_id', clientId);
        }
        
        // Store teachings in localStorage
        let knowledgeBase = [];
        
        function loadKnowledgeBase() {
            const saved = localStorage.getItem('klynx_knowledge');
            if (saved) {
                knowledgeBase = JSON.parse(saved);
            }
            displayKnowledgeBase();
        }
        
        function saveKnowledgeBase() {
            localStorage.setItem('klynx_knowledge', JSON.stringify(knowledgeBase));
            displayKnowledgeBase();
        }
        
        function displayKnowledgeBase() {
            const container = document.getElementById('knowledgeList');
            if (knowledgeBase.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.5);">No teachings yet. Teach me something!</div>';
                return;
            }
            
            container.innerHTML = knowledgeBase.map((item, index) => `
                <div class="knowledge-item">
                    <div>
                        <div class="knowledge-question">❓ ${escapeHtml(item.question)}</div>
                        <div class="knowledge-answer">📖 ${escapeHtml(item.answer.substring(0, 100))}${item.answer.length > 100 ? '...' : ''}</div>
                        <div style="font-size:11px;color:#00d4ff;margin-top:5px;">🏷️ ${item.category}</div>
                    </div>
                    <button class="delete-knowledge" onclick="deleteKnowledge(${index})"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }
        
        function deleteKnowledge(index) {
            if (confirm('Delete this teaching?')) {
                knowledgeBase.splice(index, 1);
                saveKnowledgeBase();
            }
        }
        
        async function teachAI() {
            const question = document.getElementById('question').value.trim();
            const answer = document.getElementById('answer').value.trim();
            let category = document.getElementById('category').value;
            
            if (category === 'custom') {
                category = prompt('Enter custom category:', 'General');
                if (!category) category = 'General';
            }
            
            if (!question || !answer) {
                alert('Please enter both a question and an answer!');
                return;
            }
            
            const btn = document.getElementById('teachBtn');
            const loading = document.getElementById('loading');
            btn.disabled = true;
            loading.style.display = 'block';
            
            try {
                // Store in local knowledge base
                knowledgeBase.push({
                    question: question,
                    answer: answer,
                    category: category,
                    taughtAt: new Date().toISOString()
                });
                saveKnowledgeBase();
                
                // Also send to AI to help it learn
                const response = await fetch(`${AI_API}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `I want to teach you something important. Remember this: Question: "${question}" Answer: "${answer}". Please acknowledge that you've learned this.`,
                        clientId: clientId,
                        options: { speech: false }
                    })
                });
                
                document.getElementById('question').value = '';
                document.getElementById('answer').value = '';
                
                alert('✅ Thank you! I have learned something new!');
                
            } catch (err) {
                alert('Error teaching AI: ' + err.message);
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }
        
        async function askAI() {
            const question = document.getElementById('askQuestion').value.trim();
            if (!question) {
                alert('Please enter a question!');
                return;
            }
            
            const btn = document.getElementById('askBtn');
            const loading = document.getElementById('loading');
            const responseDiv = document.getElementById('askResponse');
            const responseText = document.getElementById('responseText');
            
            btn.disabled = true;
            loading.style.display = 'block';
            responseDiv.style.display = 'none';
            
            try {
                // First check local knowledge base
                const localMatch = knowledgeBase.find(k => 
                    k.question.toLowerCase() === question.toLowerCase() ||
                    question.toLowerCase().includes(k.question.toLowerCase()) ||
                    k.question.toLowerCase().includes(question.toLowerCase())
                );
                
                let aiResponse = '';
                
                if (localMatch) {
                    aiResponse = `Based on what I was taught: ${localMatch.answer}`;
                } else {
                    // Ask AI normally
                    const response = await fetch(`${AI_API}/api/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            message: question,
                            clientId: clientId,
                            options: { speech: false }
                        })
                    });
                    const data = await response.json();
                    aiResponse = data.response || "I'm not sure about that yet. Can you teach me?";
                }
                
                responseText.innerHTML = `<strong>🤖 AI:</strong><br>${escapeHtml(aiResponse)}`;
                responseDiv.style.display = 'block';
                
                // Store the question-answer pair for feedback
                window.lastQuestion = question;
                window.lastAnswer = aiResponse;
                
            } catch (err) {
                responseText.innerHTML = `<strong>❌ Error:</strong> ${err.message}`;
                responseDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }
        
        async function markCorrect() {
            if (window.lastQuestion && window.lastAnswer) {
                const alreadyExists = knowledgeBase.some(k => k.question.toLowerCase() === window.lastQuestion.toLowerCase());
                if (!alreadyExists) {
                    const answer = prompt('What is the correct answer for this question?', window.lastAnswer);
                    if (answer && answer !== window.lastAnswer) {
                        knowledgeBase.push({
                            question: window.lastQuestion,
                            answer: answer,
                            category: 'user-taught',
                            taughtAt: new Date().toISOString()
                        });
                        saveKnowledgeBase();
                        alert('✅ Thank you! I have learned the correct answer.');
                    }
                } else {
                    alert('This question is already in my knowledge base!');
                }
            }
            document.getElementById('askResponse').style.display = 'none';
        }
        
        function markIncorrect() {
            if (window.lastQuestion) {
                const correctAnswer = prompt('What is the correct answer? Please teach me:');
                if (correctAnswer) {
                    knowledgeBase.push({
                        question: window.lastQuestion,
                        answer: correctAnswer,
                        category: 'corrected',
                        taughtAt: new Date().toISOString()
                    });
                    saveKnowledgeBase();
                    alert('✅ Thank you for correcting me! I have learned the right answer.');
                }
            }
            document.getElementById('askResponse').style.display = 'none';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Event listeners
        document.getElementById('teachBtn').onclick = teachAI;
        document.getElementById('askBtn').onclick = askAI;
        document.getElementById('correctBtn').onclick = markCorrect;
        document.getElementById('incorrectBtn').onclick = markIncorrect;
        
        // Category custom handling
        document.getElementById('category').onchange = function() {
            if (this.value === 'custom') {
                const custom = prompt('Enter custom category name:', 'My Knowledge');
                if (custom) {
                    const option = document.createElement('option');
                    option.value = custom;
                    option.textContent = custom;
                    this.appendChild(option);
                    this.value = custom;
                } else {
                    this.value = 'general';
                }
            }
        };
        
        // Load saved knowledge
        loadKnowledgeBase();
        
        // Also try to load from server if available (optional)
        async function loadServerKnowledge() {
            try {
                const response = await fetch(`${AI_API}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "What have you been taught? List any facts or knowledge users have shared with you.",
                        clientId: clientId,
                        options: { speech: false }
                    })
                });
                const data = await response.json();
                if (data.response && data.response !== "I haven't been taught anything yet.") {
                    console.log('Server has knowledge too!');
                }
            } catch(e) {}
        }
        loadServerKnowledge();
    </script>
</body>
</html>
