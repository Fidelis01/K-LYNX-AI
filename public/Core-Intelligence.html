<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-LYNX AI++ - Core Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Back Button */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 25px;
            color: white;
            text-decoration: none;
            transition: 0.3s;
            z-index: 100;
            font-size: 14px;
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
        }

        /* Profile Icon */
        .profile-icon {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #00ffaa);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .profile-icon:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .profile-icon i {
            color: #0F172A;
            font-size: 20px;
        }

        /* Chat Container */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            padding: 80px 20px 20px 20px;
        }

        /* Messages Area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Message Bubbles */
        .message {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.ai {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 20px;
            word-wrap: break-word;
        }

        .user .message-content {
            background: linear-gradient(135deg, #00d4ff, #00ffaa);
            color: #0F172A;
            border-bottom-right-radius: 5px;
        }

        .ai .message-content {
            background: rgba(255,255,255,0.1);
            color: white;
            border-bottom-left-radius: 5px;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 5px;
            display: block;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 12px 18px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #00d4ff;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: rgba(15, 23, 42, 0.95);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            margin-top: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 14px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .input-area input:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .input-area button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #00ffaa);
            border: none;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0F172A;
            font-size: 18px;
        }

        .input-area button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        /* Suggestions */
        .suggestions {
            padding: 10px 20px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            margin-bottom: 10px;
        }

        .suggestion-chip {
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s;
        }

        .suggestion-chip:hover {
            background: rgba(0, 212, 255, 0.3);
            color: #00d4ff;
        }

        /* Scrollbar */
        .messages-area::-webkit-scrollbar {
            width: 6px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #00d4ff;
            border-radius: 10px;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0,212,255,0.3);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            color: #00d4ff;
        }

        @media (max-width: 768px) {
            .message-content { max-width: 85%; }
            .chat-container { padding: 70px 15px 15px 15px; }
            .profile-icon { width: 40px; height: 40px; top: 15px; right: 15px; }
            .back-btn { top: 15px; left: 15px; padding: 8px 16px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="spinner"></div>
        <div class="loading-text">Checking authentication...</div>
    </div>

    <!-- Back Button -->
    <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>

    <div class="chat-container">
        <div class="messages-area" id="messagesArea">
            <div class="message ai">
                <div class="message-content">
                    🧠 Hello! I'm K-LYNX Core Intelligence. I can help you with questions, problem-solving, research, and much more. What would you like to know today?
                    <span class="message-time">Just now</span>
                </div>
            </div>
        </div>

        <div class="suggestions">
            <div class="suggestion-chip" onclick="sendSuggestion('What is artificial intelligence?')">What is AI?</div>
            <div class="suggestion-chip" onclick="sendSuggestion('Explain quantum computing')">Explain quantum computing</div>
            <div class="suggestion-chip" onclick="sendSuggestion('Help me solve a math problem')">Solve a math problem</div>
            <div class="suggestion-chip" onclick="sendSuggestion('What is the meaning of life?')">Meaning of life?</div>
            <div class="suggestion-chip" onclick="sendSuggestion('Tell me a fun fact')">Fun fact</div>
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Ask me anything..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        // ============ AUTHENTICATION CHECK ============
        const token = localStorage.getItem('token');
        const user = localStorage.getItem('user');
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        if (!token && !user) {
            loadingOverlay.style.display = 'flex';
            setTimeout(() => {
                window.location.href = '/login.html';
            }, 1000);
        } else {
            loadingOverlay.style.display = 'none';
            if (user) {
                try {
                    const userData = JSON.parse(user);
                    console.log('Logged in as:', userData.name);
                } catch(e) {}
            }
        }

        // ============ JAI API CONFIGURATION ============
        const API_URL = 'https://jai1-sh81.onrender.com';
        let clientId = localStorage.getItem('klynx_client_id');
        if (!clientId) {
            clientId = 'klynx_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('klynx_client_id', clientId);
        }

        // ============ CHAT FUNCTIONS ============
       

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function sendSuggestion(text) {
            document.getElementById('messageInput').value = text;
            sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            input.value = '';
            addMessage(message, 'user');
            showTypingIndicator();
            
            let retries = 3;
            let delay = 1000;
            
            for (let i = 0; i < retries; i++) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 30000);
                    
                    const response = await fetch(`${API_URL}/api/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            message: message,
                            clientId: clientId,
                            options: { speech: false }
                        }),
                        signal: controller.signal
                    });
                    
                    clearTimeout(timeoutId);
                    
                    if (response.ok) {
                        const data = await response.json();
                        hideTypingIndicator();
                        const reply = data.response || data.reply || data.message || "I received your message!";
                        addMessage(reply, 'ai');
                        return;
                    } else if (response.status === 503 || response.status === 429) {
                        await new Promise(resolve => setTimeout(resolve, delay));
                        delay *= 2;
                        continue;
                    } else {
                        throw new Error(`HTTP ${response.status}`);
                    }
                } catch (error) {
                    if (error.name === 'AbortError') {
                        if (i === retries - 1) {
                            hideTypingIndicator();
                            addMessage("⚠️ The request timed out. Please try again.", 'ai');
                        } else {
                            await new Promise(resolve => setTimeout(resolve, delay));
                            delay *= 2;
                        }
                    } else if (i === retries - 1) {
                        hideTypingIndicator();
                        addMessage(getFallbackResponse(message), 'ai');
                    } else {
                        await new Promise(resolve => setTimeout(resolve, delay));
                        delay *= 2;
                    }
                }
            }
        }

        function getFallbackResponse(message) {
            const msg = message.toLowerCase();
            
            if (msg.includes('hello') || msg.includes('hi') || msg.includes('hey')) {
                return "Hello! 👋 I'm K-LYNX Core Intelligence. How can I assist you today?";
            }
            else if (msg.includes('how are you')) {
                return "I'm functioning optimally, thank you! Ready to help you with any questions.";
            }
            else if (msg.includes('what is ai') || msg.includes('what is artificial intelligence')) {
                return "Artificial Intelligence (AI) is the simulation of human intelligence in machines that are programmed to think and learn. It encompasses machine learning, natural language processing, computer vision, and more. Would you like to know about any specific aspect of AI?";
            }
            else if (msg.includes('quantum')) {
                return "Quantum computing uses quantum-mechanical phenomena like superposition and entanglement to perform computations. Unlike classical computers that use bits (0 or 1), quantum computers use qubits that can exist in multiple states simultaneously, allowing them to solve certain problems much faster.";
            }
            else if (msg.includes('math')) {
                return "I'd be happy to help with math! Please share your math problem and I'll do my best to solve it or explain the concept.";
            }
            else if (msg.includes('fun fact')) {
                const facts = [
                    "Did you know? Honey never spoils. Archaeologists have found 3000-year-old honey in Egyptian tombs that was still edible!",
                    "Octopuses have three hearts and blue blood!",
                    "A day on Venus is longer than a year on Venus!",
                    "Bananas are berries, but strawberries aren't!",
                    "The Eiffel Tower can grow up to 15 cm taller in summer due to thermal expansion!"
                ];
                return facts[Math.floor(Math.random() * facts.length)];
            }
            else if (msg.includes('meaning of life')) {
                return "That's a profound question! Many philosophers, scientists, and thinkers have contemplated this. Some say it's about happiness, others about contribution, connection, or personal growth. What does meaning look like to you?";
            }
            else {
                return "Thanks for your question! I'm processing it. The Core Intelligence is here to help with knowledge, problem-solving, and insights. Could you rephrase or ask me something specific?";
            }
        }

        function addMessage(text, sender) {
            const messagesArea = document.getElementById('messagesArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            messageDiv.innerHTML = `
                <div class="message-content">
                    ${escapeHtml(text)}
                    <span class="message-time">${time}</span>
                </div>
            `;
            
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function showTypingIndicator() {
            const messagesArea = document.getElementById('messagesArea');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            messagesArea.appendChild(typingDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
