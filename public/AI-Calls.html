<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>K-LYNX AI++ - AI Voice Call</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Open Sans',sans-serif;background:linear-gradient(135deg,#0F172A 0%,#1E293B 100%);min-height:100vh;}
        .back-btn{position:fixed;top:20px;left:20px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);padding:10px 20px;border-radius:25px;color:white;text-decoration:none;transition:0.3s;z-index:100;font-size:14px;display:flex;align-items:center;gap:8px;}
        .back-btn:hover{background:rgba(0,212,255,0.2);border-color:#00d4ff;}
        .container{max-width:800px;margin:0 auto;padding:80px 20px 40px;}
        .call-card{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border-radius:30px;padding:30px;border:1px solid rgba(0,212,255,0.3);text-align:center;}
        .avatar{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,#00d4ff,#00ffaa);margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:60px;}
        .avatar.listening{animation:pulse 1.5s infinite;}
        .avatar.speaking{animation:speakPulse 0.8s infinite;}
        @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(0,212,255,0.7);}70%{box-shadow:0 0 0 15px rgba(0,212,255,0);}100%{box-shadow:0 0 0 0 rgba(0,212,255,0);}}
        @keyframes speakPulse{0%{transform:scale(1);}50%{transform:scale(1.05);}100%{transform:scale(1);}}
        .status{font-size:18px;margin-bottom:10px;}.status.connected{color:#88ff88;}.status.disconnected{color:#ff8888;}.status.listening{color:#ffaa44;}
        .caller-name{font-size:24px;font-weight:700;color:#00d4ff;margin-bottom:20px;}
        .call-controls{display:flex;justify-content:center;gap:25px;margin:20px 0;}
        .call-btn{width:80px;height:80px;border-radius:50%;border:none;cursor:pointer;transition:0.3s;font-size:32px;}
        .call-btn.start{background:#00ffaa;color:#0F172A;}
        .call-btn.end{background:#ff4444;color:white;}
        .call-btn.mute{background:rgba(255,255,255,0.1);color:white;}
        .call-btn.mute.active{background:#ffaa00;color:#0F172A;}
        .call-btn:hover{transform:scale(1.1);}
        .chat-area{background:rgba(0,0,0,0.3);border-radius:20px;padding:20px;margin-top:20px;max-height:300px;overflow-y:auto;}
        .chat-message{margin-bottom:15px;display:flex;}
        .chat-message.user{justify-content:flex-end;}.chat-message.ai{justify-content:flex-start;}
        .chat-bubble{max-width:70%;padding:10px 15px;border-radius:18px;}
        .user .chat-bubble{background:linear-gradient(135deg,#00d4ff,#00ffaa);color:#0F172A;}
        .ai .chat-bubble{background:rgba(255,255,255,0.1);border:1px solid rgba(0,212,255,0.3);}
        .chat-time{font-size:10px;opacity:0.5;margin-top:5px;display:block;}
        .chat-input-area{display:flex;gap:10px;margin-top:15px;}
        .chat-input-area input{flex:1;padding:12px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.2);border-radius:25px;color:white;}
        .chat-input-area button{padding:12px 20px;background:linear-gradient(135deg,#00d4ff,#00ffaa);border:none;border-radius:25px;cursor:pointer;font-weight:bold;}
        .typing-indicator{display:inline-flex;gap:4px;padding:8px 12px;background:rgba(255,255,255,0.1);border-radius:18px;}
        .typing-indicator span{width:6px;height:6px;background:#00d4ff;border-radius:50%;animation:typingBounce 1.4s infinite;}
        @keyframes typingBounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}
        @media (max-width:768px){.container{padding:70px 15px 30px;}.call-btn{width:70px;height:70px;font-size:28px;}}
    </style>
</head>
<body>
    <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
    <div class="container">
        <div class="call-card">
            <div class="avatar" id="avatar">🤖</div>
            <div class="caller-name">K-LYNX AI Voice</div>
            <div class="status disconnected" id="status">● Tap microphone to start</div>
            <div class="call-controls">
                <button class="call-btn start" id="startBtn"><i class="fas fa-microphone"></i></button>
                <button class="call-btn mute" id="muteBtn" style="display:none;"><i class="fas fa-microphone"></i></button>
                <button class="call-btn end" id="endBtn" style="display:none;"><i class="fas fa-phone-slash"></i></button>
            </div>
        </div>
        <div class="chat-area" id="chatArea">
            <div id="chatMessages">
                <div class="chat-message ai">
                    <div class="chat-bubble">👋 Hi! I'm K-LYNX AI. Tap the microphone and start speaking. I'll listen continuously and respond naturally.<span class="chat-time">Now</span></div>
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Or type your message...">
                <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login.html';

        let recognition = null;
        let isCallActive = false;
        let isListening = false;
        let isMuted = false;
        let speechSynthesis = window.speechSynthesis;
        let currentUtterance = null;
        let continuousListening = true;
        let processingResponse = false;

        const AI_API = 'https://jai1-sh81.onrender.com';
        let clientId = localStorage.getItem('klynx_client_id');
        if (!clientId) {
            clientId = 'voice_' + Date.now();
            localStorage.setItem('klynx_client_id', clientId);
        }

        const avatar = document.getElementById('avatar');
        const statusDiv = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const muteBtn = document.getElementById('muteBtn');
        const endBtn = document.getElementById('endBtn');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');

        // Initialize speech recognition for continuous listening
        function initRecognition() {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SR();
                recognition.continuous = true;  // Keep listening continuously
                recognition.interimResults = true;  // Show interim results
                recognition.lang = 'en-US';
                recognition.maxAlternatives = 1;

                recognition.onstart = () => {
                    isListening = true;
                    statusDiv.innerHTML = '● Listening... Speak now';
                    statusDiv.className = 'status listening';
                    avatar.classList.add('listening');
                    avatar.classList.remove('speaking');
                    startBtn.style.display = 'none';
                    muteBtn.style.display = 'flex';
                    endBtn.style.display = 'flex';
                };

                recognition.onresult = (event) => {
                    let finalTranscript = '';
                    let interimTranscript = '';
                    
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        const transcript = event.results[i][0].transcript;
                        if (event.results[i].isFinal) {
                            finalTranscript += transcript;
                        } else {
                            interimTranscript += transcript;
                        }
                    }
                    
                    if (finalTranscript) {
                        // Stop listening temporarily while processing
                        if (continuousListening && !processingResponse) {
                            recognition.stop();
                            processUserMessage(finalTranscript);
                        }
                    }
                };

                recognition.onerror = (event) => {
                    console.error('Recognition error:', event.error);
                    if (event.error === 'no-speech') {
                        // Continue listening
                        if (isCallActive && continuousListening) {
                            setTimeout(() => {
                                if (isCallActive && !processingResponse) {
                                    try { recognition.start(); } catch(e) {}
                                }
                            }, 500);
                        }
                    } else if (event.error === 'network') {
                        statusDiv.innerHTML = '● Network error - reconnecting...';
                        setTimeout(() => {
                            if (isCallActive) {
                                try { recognition.start(); } catch(e) {}
                            }
                        }, 2000);
                    }
                };

                recognition.onend = () => {
                    if (isCallActive && continuousListening && !processingResponse) {
                        // Restart listening after a short delay
                        setTimeout(() => {
                            if (isCallActive && !processingResponse) {
                                try { recognition.start(); } catch(e) {}
                            }
                        }, 500);
                    }
                };
            } else {
                statusDiv.innerHTML = '● Voice not supported - use text chat';
                addMessage("⚠️ Your browser doesn't support voice recognition. Please use the text input instead.", 'ai');
            }
        }

        async function processUserMessage(text) {
            if (processingResponse) return;
            processingResponse = true;
            
            // Stop listening while processing
            if (recognition) {
                try { recognition.stop(); } catch(e) {}
            }
            
            // Show what user said
            addMessage(text, 'user');
            
            // Show thinking/typing indicator
            showTyping();
            statusDiv.innerHTML = '● Thinking...';
            avatar.classList.remove('listening');
            avatar.classList.add('speaking');
            
            try {
                const response = await fetch(`${AI_API}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        clientId: clientId,
                        options: { speech: false }
                    })
                });
                const data = await response.json();
                const reply = data.response || "I received your message. How can I help?";
                
                hideTyping();
                addMessage(reply, 'ai');
                
                // Speak the response
                await speakResponse(reply);
                
            } catch (err) {
                hideTyping();
                addMessage("Sorry, I'm having trouble responding.", 'ai');
            } finally {
                processingResponse = false;
                statusDiv.innerHTML = '● Listening... Speak now';
                avatar.classList.add('listening');
                avatar.classList.remove('speaking');
                
                // Resume listening
                if (isCallActive && continuousListening && recognition) {
                    setTimeout(() => {
                        if (isCallActive && !processingResponse) {
                            try { recognition.start(); } catch(e) {}
                        }
                    }, 500);
                }
            }
        }

        function speakResponse(text) {
            return new Promise((resolve) => {
                if (currentUtterance) {
                    speechSynthesis.cancel();
                }
                currentUtterance = new SpeechSynthesisUtterance(text);
                currentUtterance.rate = 0.9;
                currentUtterance.pitch = 1;
                currentUtterance.volume = 1;
                currentUtterance.onend = () => {
                    currentUtterance = null;
                    resolve();
                };
                currentUtterance.onerror = () => {
                    currentUtterance = null;
                    resolve();
                };
                speechSynthesis.speak(currentUtterance);
            });
        }

        function startCall() {
            if (!recognition) {
                initRecognition();
            }
            isCallActive = true;
            continuousListening = true;
            statusDiv.innerHTML = '● Listening... Speak now';
            statusDiv.className = 'status listening';
            avatar.classList.add('listening');
            startBtn.style.display = 'none';
            muteBtn.style.display = 'flex';
            endBtn.style.display = 'flex';
            
            if (recognition) {
                try {
                    recognition.start();
                } catch(e) {
                    console.log('Recognition already started');
                }
            }
        }

        function endCall() {
            isCallActive = false;
            continuousListening = false;
            processingResponse = false;
            
            if (recognition) {
                try { recognition.stop(); } catch(e) {}
            }
            if (currentUtterance) {
                speechSynthesis.cancel();
                currentUtterance = null;
            }
            
            statusDiv.innerHTML = '● Call ended - tap microphone to start';
            statusDiv.className = 'status disconnected';
            avatar.classList.remove('listening', 'speaking');
            startBtn.style.display = 'flex';
            muteBtn.style.display = 'none';
            endBtn.style.display = 'none';
        }

        function toggleMute() {
            isMuted = !isMuted;
            if (isMuted) {
                if (recognition) {
                    try { recognition.stop(); } catch(e) {}
                }
                muteBtn.innerHTML = '<i class="fas fa-microphone-slash"></i>';
                muteBtn.classList.add('active');
                statusDiv.innerHTML = '● Muted - tap mic to unmute';
            } else {
                muteBtn.innerHTML = '<i class="fas fa-microphone"></i>';
                muteBtn.classList.remove('active');
                statusDiv.innerHTML = '● Listening... Speak now';
                if (isCallActive && recognition) {
                    try { recognition.start(); } catch(e) {}
                }
            }
        }

        async function sendTextMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            chatInput.value = '';
            
            if (!isCallActive) {
                startCall();
            }
            
            processingResponse = true;
            if (recognition) {
                try { recognition.stop(); } catch(e) {}
            }
            
            addMessage(text, 'user');
            showTyping();
            statusDiv.innerHTML = '● Thinking...';
            
            try {
                const response = await fetch(`${AI_API}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        clientId: clientId,
                        options: { speech: false }
                    })
                });
                const data = await response.json();
                const reply = data.response || "Got it!";
                hideTyping();
                addMessage(reply, 'ai');
                await speakResponse(reply);
            } catch (err) {
                hideTyping();
                addMessage("Sorry, error.", 'ai');
            } finally {
                processingResponse = false;
                statusDiv.innerHTML = '● Listening... Speak now';
                if (isCallActive && recognition && !isMuted) {
                    setTimeout(() => {
                        try { recognition.start(); } catch(e) {}
                    }, 500);
                }
            }
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `chat-message ${sender}`;
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            div.innerHTML = `<div class="chat-bubble">${escapeHtml(text)}<span class="chat-time">${time}</span></div>`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
            const div = document.createElement('div');
            div.id = 'typing';
            div.className = 'chat-message ai';
            div.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Event listeners
        startBtn.onclick = startCall;
        endBtn.onclick = endCall;
        muteBtn.onclick = toggleMute;
        sendBtn.onclick = sendTextMessage;
        chatInput.onkeypress = (e) => { if (e.key === 'Enter') sendTextMessage(); };

        // Initialize
        initRecognition();
    </script>
</body>
</html>
