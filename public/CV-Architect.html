<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-LYNX AI++ - CV Architect</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Open Sans',sans-serif;background:linear-gradient(135deg,#0F172A 0%,#1E293B 100%);min-height:100vh;}
        .back-btn{position:fixed;top:20px;left:20px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);padding:10px 20px;border-radius:25px;color:white;text-decoration:none;transition:0.3s;z-index:100;font-size:14px;display:flex;align-items:center;gap:8px;}
        .back-btn:hover{background:rgba(0,212,255,0.2);border-color:#00d4ff;}
        .container{max-width:1000px;margin:0 auto;padding:80px 20px 40px;}
        .header-section{text-align:center;margin-bottom:40px;}
        .header-section h1{font-size:48px;background:linear-gradient(135deg,#00d4ff,#00ffaa);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:15px;}
        .header-section p{color:rgba(255,255,255,0.7);font-size:18px;}
        .template-selector{display:flex;justify-content:center;gap:15px;margin-bottom:30px;flex-wrap:wrap;}
        .template-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);padding:12px 24px;border-radius:40px;color:white;cursor:pointer;transition:0.3s;font-weight:600;}
        .template-btn.active,.template-btn:hover{background:linear-gradient(135deg,#00d4ff,#00ffaa);color:#0F172A;border-color:transparent;}
        .input-section{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border-radius:20px;padding:30px;margin-bottom:30px;border:1px solid rgba(0,212,255,0.3);}
        .input-group{margin-bottom:20px;}
        .input-group label{display:block;color:rgba(255,255,255,0.9);margin-bottom:8px;font-weight:600;}
        .input-group input,.input-group textarea{width:100%;padding:12px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.2);border-radius:12px;color:white;font-size:14px;font-family:'Open Sans',sans-serif;}
        .input-group input:focus,.input-group textarea:focus{outline:none;border-color:#00d4ff;}
        .input-group textarea{min-height:80px;resize:vertical;}
        .row-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
        .generate-btn{background:linear-gradient(135deg,#00d4ff,#00ffaa);color:#0F172A;padding:14px;border:none;border-radius:40px;font-size:16px;font-weight:700;cursor:pointer;transition:0.3s;width:100%;margin-top:10px;}
        .generate-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,212,255,0.3);}
        .generate-btn:disabled{opacity:0.5;cursor:not-allowed;}
        .output-section{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border-radius:20px;padding:30px;border:1px solid rgba(0,212,255,0.3);}
        .output-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
        .output-header h3{color:#00d4ff;font-size:20px;}
        .output-actions{display:flex;gap:10px;}
        .action-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);padding:8px 16px;border-radius:20px;color:white;cursor:pointer;font-size:12px;}
        .action-btn:hover{background:rgba(0,212,255,0.2);border-color:#00d4ff;}
        .output-content{background:rgba(0,0,0,0.3);border-radius:15px;padding:20px;min-height:300px;white-space:pre-wrap;line-height:1.6;color:rgba(255,255,255,0.9);font-family:monospace;}
        .loading{display:none;text-align:center;padding:20px;}
        .spinner{width:40px;height:40px;border:3px solid rgba(0,212,255,0.3);border-top-color:#00d4ff;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .example-chip{display:inline-block;background:rgba(255,255,255,0.1);padding:6px 12px;border-radius:20px;font-size:11px;cursor:pointer;margin:5px;}
        .example-chip:hover{background:rgba(0,212,255,0.3);color:#00d4ff;}
        .loading-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;justify-content:center;align-items:center;z-index:9999;flex-direction:column;}
        .loading-spinner{width:50px;height:50px;border:3px solid rgba(0,212,255,0.3);border-top-color:#00d4ff;border-radius:50%;animation:spin 1s linear infinite;}
        @media (max-width:768px){.container{padding:70px 15px 30px;}.header-section h1{font-size:32px;}.template-btn{padding:8px 16px;font-size:12px;}.row-2{grid-template-columns:1fr;}}
    </style>
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay" style="display:none;"><div class="loading-spinner"></div><div style="margin-top:20px;color:#00d4ff;">Checking...</div></div>
    <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    <div class="container">
        <div class="header-section"><h1>📝 CV Architect</h1><p>Build a professional CV tailored to your dream job</p></div>
        <div class="template-selector">
            <button class="template-btn active" data-template="professional">💼 Professional</button>
            <button class="template-btn" data-template="creative">🎨 Creative</button>
            <button class="template-btn" data-template="tech">💻 Tech/IT</button>
            <button class="template-btn" data-template="executive">👔 Executive</button>
            <button class="template-btn" data-template="entry">🎓 Entry Level</button>
        </div>
        <div class="input-section">
            <div class="row-2">
                <div class="input-group"><label>Full Name</label><input type="text" id="name" placeholder="Your full name"></div>
                <div class="input-group"><label>Job Title</label><input type="text" id="title" placeholder="e.g., Software Engineer"></div>
            </div>
            <div class="row-2">
                <div class="input-group"><label>Email</label><input type="email" id="email" placeholder="your@email.com"></div>
                <div class="input-group"><label>Phone</label><input type="text" id="phone" placeholder="+1234567890"></div>
            </div>
            <div class="input-group"><label>LinkedIn/GitHub (optional)</label><input type="text" id="social" placeholder="linkedin.com/in/yourname"></div>
            <div class="input-group"><label>Professional Summary</label><textarea id="summary" placeholder="Brief overview of your experience and career goals..."></textarea></div>
            <div class="input-group"><label>Work Experience</label><textarea id="experience" placeholder="Job title, company, dates, key achievements..."></textarea></div>
            <div class="input-group"><label>Education</label><textarea id="education" placeholder="Degree, institution, year, relevant coursework..."></textarea></div>
            <div class="input-group"><label>Skills</label><textarea id="skills" placeholder="Technical skills, soft skills, languages..."></textarea></div>
            <div><span class="example-chip" onclick="fillExample('tech')">💻 Tech Example</span>
            <span class="example-chip" onclick="fillExample('creative')">🎨 Creative Example</span>
            <span class="example-chip" onclick="fillExample('entry')">🎓 Entry Level</span></div>
            <button class="generate-btn" id="generateBtn">📄 Generate CV</button>
        </div>
        <div class="output-section">
            <div class="output-header"><h3><i class="fas fa-file-alt"></i> Your Professional CV</h3><div class="output-actions"><button class="action-btn" onclick="copyOutput()">Copy</button><button class="action-btn" onclick="downloadOutput()">Download</button><button class="action-btn" onclick="clearOutput()">Clear</button></div></div>
            <div class="output-content" id="outputContent"><em>Your professionally formatted CV will appear here...</em></div>
            <div class="loading" id="loadingIndicator"><div class="spinner"></div><p>Crafting your CV...</p></div>
        </div>
    </div>
    <script>
        const token=localStorage.getItem('token'),user=localStorage.getItem('user');
        if(!token&&!user){document.getElementById('loadingOverlay').style.display='flex';setTimeout(()=>{window.location.href='/login.html';},1000);}
        else{document.getElementById('loadingOverlay').style.display='none';}
        const API_URL='https://jai1-sh81.onrender.com';
        let clientId=localStorage.getItem('klynx_client_id');
        if(!clientId){clientId='klynx_'+Date.now()+'_'+Math.random().toString(36).substr(2,9);localStorage.setItem('klynx_client_id',clientId);}
        let currentTemplate='professional',currentOutput='';
        document.querySelectorAll('.template-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.template-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentTemplate=btn.dataset.template;});});
        function fillExample(type){
            if(type=='tech'){
                document.getElementById('name').value='Sarah Johnson';document.getElementById('title').value='Full Stack Developer';
                document.getElementById('email').value='sarah.johnson@email.com';document.getElementById('phone').value='+1 (555) 123-4567';
                document.getElementById('social').value='github.com/sarahjohnson';document.getElementById('summary').value='Full Stack Developer with 5+ years of experience building scalable web applications. Proficient in React, Node.js, and Python.';
                document.getElementById('experience').value='Senior Developer - TechCorp (2021-Present)\n- Led development of 3 major features serving 1M+ users\n- Reduced load times by 40% through optimization\nJunior Developer - StartUp Inc (2018-2021)\n- Built REST APIs and integrated third-party services';
                document.getElementById('education').value='M.S. Computer Science - Stanford University (2018)\nB.S. Software Engineering - MIT (2016)';
                document.getElementById('skills').value='JavaScript, React, Node.js, Python, MongoDB, PostgreSQL, AWS, Git, Docker';
            }
            if(type=='creative'){
                document.getElementById('name').value='Alex Rivera';document.getElementById('title').value='Graphic Designer';
                document.getElementById('email').value='alex.rivera@email.com';document.getElementById('phone').value='+1 (555) 987-6543';
                document.getElementById('summary').value='Creative Graphic Designer with 4+ years of experience in branding, print, and digital media. Passionate about visual storytelling.';
                document.getElementById('experience').value='Designer - Creative Studio (2020-Present)\n- Created brand identities for 20+ clients\n- Designed marketing materials increasing engagement by 35%\nJunior Designer - Agency X (2018-2020)\n- Assisted in web and print design projects';
                document.getElementById('education').value='BFA Graphic Design - Rhode Island School of Design (2018)\nCertificate in UX/UI Design (2020)';
                document.getElementById('skills').value='Adobe Creative Suite, Figma, Sketch, Typography, Branding, Illustration, HTML/CSS';
            }
            if(type=='entry'){
                document.getElementById('name').value='Emily Chen';document.getElementById('title').value='Marketing Graduate';
                document.getElementById('email').value='emily.chen@email.com';document.getElementById('phone').value='+1 (555) 555-5555';
                document.getElementById('summary').value='Recent Marketing graduate with internship experience seeking entry-level position. Strong communication and analytical skills.';
                document.getElementById('experience').value='Marketing Intern - Brand Co (2023)\n- Managed social media reaching 50K+ followers\n- Analyzed campaign data and prepared reports\nStudent Assistant - University Marketing (2022-2023)\n- Created content for university newsletter';
                document.getElementById('education').value='B.S. Marketing - University of California (2024)\nGPA: 3.8/4.0\nRelevant Coursework: Digital Marketing, Consumer Behavior, Data Analytics';
                document.getElementById('skills').value='Social Media Management, Google Analytics, SEO, Content Creation, MS Office, Communication';
            }
        }
        async function generateCV(){
            const data={name:document.getElementById('name').value,titl:document.getElementById('title').value,email:document.getElementById('email').value,phone:document.getElementById('phone').value,social:document.getElementById('social').value,summary:document.getElementById('summary').value,experience:document.getElementById('experience').value,education:document.getElementById('education').value,skills:document.getElementById('skills').value,template:currentTemplate};
            const hasData=data.name||data.summary||data.experience;
            if(!hasData){alert('Please fill in at least your name and some experience!');return;}
            const btn=document.getElementById('generateBtn');btn.disabled=true;btn.textContent='Generating...';
            document.getElementById('loadingIndicator').style.display='block';
            const prompt=`Create a professional CV using the ${currentTemplate} template format. Use this information:
Name: ${data.name}
Job Title: ${data.titl || 'Not specified'}
Contact: ${data.email} | ${data.phone} | ${data.social}
Summary: ${data.summary || 'Not provided'}
Work Experience: ${data.experience || 'Not provided'}
Education: ${data.education || 'Not provided'}
Skills: ${data.skills || 'Not provided'}

Format the CV beautifully with clear sections, bullet points, and professional language. Use markdown or plain text with proper spacing. Include a header with name and title, then Summary, Experience, Education, Skills sections. Make it ATS-friendly.`;
            try{
                const res=await fetch(`${API_URL}/api/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:prompt,clientId:clientId,options:{speech:false}})});
                const result=await res.json();
                if(res.ok&&result.response){currentOutput=result.response;document.getElementById('outputContent').innerHTML=currentOutput.replace(/\n/g,'<br>');}
                else throw new Error('Failed');
            }catch(error){document.getElementById('outputContent').innerHTML='<span style="color:#ff8888;">❌ CV generation failed. Please try again.</span>';}
            finally{btn.disabled=false;btn.textContent='📄 Generate CV';document.getElementById('loadingIndicator').style.display='none';}
        }
        function copyOutput(){if(!currentOutput){alert('Nothing to copy');return;}navigator.clipboard.writeText(currentOutput);alert('✅ CV copied!');}
        function downloadOutput(){if(!currentOutput){alert('Nothing to download');return;}const blob=new Blob([currentOutput],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`CV_${Date.now()}.txt`;a.click();URL.revokeObjectURL(a.href);}
        function clearOutput(){currentOutput='';document.getElementById('outputContent').innerHTML='<em>Your professionally formatted CV will appear here...</em>';}
        document.getElementById('generateBtn').addEventListener('click',generateCV);
    </script>
</body>
</html>
