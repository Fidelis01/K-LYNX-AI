<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sign Up | K-LYNX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-color: #0F172A;
        }

        .signup-container {
            max-width: 450px;
            width: 100%;
        }

        .signup-card {
            background: rgba(15, 25, 45, 0.2);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 35px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .logo h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #00d4ff, #00ffaa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 5px;
        }

        .logo p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.8rem;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
        }

        .input-group input:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .signup-btn {
            width: 100%;
            background: linear-gradient(135deg, #00d4ff, #00aa88);
            border: none;
            border-radius: 40px;
            padding: 12px;
            font-weight: bold;
            font-size: 1rem;
            color: #0a0f1e;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        .signup-btn:hover { transform: scale(1.02); }

        .login-link {
            margin-top: 18px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
        }

        .login-link a { color: #00d4ff; text-decoration: none; }

        .error-msg, .success-msg {
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: none;
        }

        .error-msg { background: rgba(255, 80, 80, 0.2); border: 1px solid rgba(255, 80, 80, 0.5); color: #ff8888; }
        .success-msg { background: rgba(0, 255, 100, 0.2); border: 1px solid rgba(0, 255, 100, 0.5); color: #88ff88; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #loginForm { animation: fadeIn 0.3s ease-in-out; }
    </style>
</head>
<body id="signupBody">
  <div class="signup-container">
    <div class="signup-card">
      <div class="logo">
        <h1>K-LYNX AI++</h1>
        <p id="form-title">Create your account</p>
      </div>
        
        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>
        
      <div id="signup-form">
            <div class="input-group">
                <label>👤 Full Name</label>
                <input type="text" id="fullname" placeholder="Enter your full name" autofocus>
            </div>

            <div class="input-group">
                <label>📧 Email Address</label>
                <input type="email" id="email" placeholder="email@example.com">
            </div>

            <div class="input-group">
                <label>🌐 Preferred Language</label>
                <input type="text" id="language" placeholder="e.g. English">
            </div>

            <div class="input-group">
                <label>🔑 Password</label>
                <input type="password" id="password" placeholder="Create a password">
            </div>

            <div class="input-group">
                <label>✓ Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password">
            </div>

            <button id="signupBtn" class="signup-btn">Create Account</button>
      </div>

      <div id="loginForm" style="display: none;">
        <div class="input-group">
            <label>📧 Email Address</label>
          <input type="email" id="loginEmail" placeholder="Enter your email">
        </div>
        <div class="input-group">
            <label>🔑 Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password">
        </div>

        <button id="loginBtn" class="signup-btn">Login</button>
        </div>

      <div class="login-link">
        <span id="toggle-text">Already have an account?</span> 
        <a href="#" id="login-link">Login</a>
      </div>
        </div>
    </div>

  <!-- NOTE: Changed to type="module" to support Firebase imports -->
  <script type="module">
    // 1. IMPORT FIREBASE CLIENT SDK (Modular v10)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    // 2. YOUR FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyDxxjFQkZuaKpf-MLwSrgFgOV513UqYi_A",
        authDomain: "klynx-ai-7d556.firebaseapp.com",
        projectId: "klynx-ai-7d556",
        storageBucket: "klynx-ai-7d556.firebasestorage.app",
        messagingSenderId: "281796331487",
        appId: "1:281796331487:web:3c5e431bd396a1bf28e66a",
        measurementId: "G-VR3RJWNVFK"
    };

    // 3. INITIALIZE
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // UI Logic (NO CHANGES TO YOUR UI)
    document.getElementById('login-link').addEventListener('click', (e) => {
        e.preventDefault();
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signup-form');
        const title = document.getElementById('form-title');
        const toggleLink = document.getElementById('login-link');
        const toggleText = document.getElementById('toggle-text');

        if (loginForm.style.display === 'none') {
            loginForm.style.display = 'block';
            signupForm.style.display = 'none';
            title.innerText = 'Login to your account';
            toggleText.innerText = "Don't have an account?";
            toggleLink.innerText = 'Sign Up';
        } else {
            loginForm.style.display = 'none';
            signupForm.style.display = 'block';
            title.innerText = 'Create your account';
            toggleText.innerText = 'Already have an account?';
            toggleLink.innerText = 'Login';
        }
    });

    function showError(msg) {
        const errorDiv = document.getElementById('errorMsg');
        errorDiv.textContent = msg;
        errorDiv.style.display = 'block';
        setTimeout(() => { errorDiv.style.display = 'none'; }, 4000);
    }

    function showSuccess(msg) {
        const successDiv = document.getElementById('successMsg');
        successDiv.textContent = msg;
        successDiv.style.display = 'block';
    }

    // Backend API Logic
    
    async function signup() {
        const name = document.getElementById('fullname').value.trim();
        const email = document.getElementById('email').value.trim();
        const language = document.getElementById('language').value.trim();
        const password = document.getElementById('password').value.trim();
        const confirmPassword = document.getElementById('confirmPassword').value.trim();

        if (!name || !email || !password) return showError('❌ Please fill in Name, Email, and Password');
        if (password !== confirmPassword) return showError('❌ Passwords do not match');

        try {
            const response = await fetch('/api/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password, language })
            });
            const data = await response.json();
            if (response.ok && data.success) {
                showSuccess('✅ Registered! Please log in.');
                setTimeout(() => { document.getElementById('login-link').click(); }, 2500);
            } else {
                showError('❌ ' + (data.message || 'Registration failed'));
            }
        } catch (err) {
            showError('❌ Could not connect to the server');
        }
    }

    async function login() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();

        if (!email || !password) return showError('❌ Please fill in all fields');

        try {
            // Ensure session stays active even after refresh
            await setPersistence(auth, browserLocalPersistence);
            
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const idToken = await userCredential.user.getIdToken();

            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ idToken })
            });

            const data = await response.json();

            if (response.ok && data.success) {
                showSuccess(`✅ Welcome back! Redirecting...`);
                // Use a short delay so the user sees the success message
                setTimeout(() => { window.location.href = '/index.html'; }, 1000);
            } else {
                showError('❌ ' + (data.message || 'Server rejected token'));
            }
        } catch (err) {
            console.error(err);
            if(err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password') {
                showError('❌ Invalid email or password.');
            } else {
                showError('❌ Login failed. Check your connection.');
            }
        }
    }

    // Attach Event Listeners
    document.getElementById('signupBtn').addEventListener('click', signup);
    document.getElementById('loginBtn').addEventListener('click', login);

    // Smart Auth Check (Unified v10 Syntax)
    let isInitialLoad = true;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            console.log("Active Session:", user.email);
            // If we are already on the signup/login page and logged in, go to index
            if (window.location.pathname.includes('signup.html') || window.location.pathname === '/') {
                // Remove redirect if you want the user to stay on the signup page after logout
            }
        } else {
            if (!isInitialLoad) {
                console.log("Session ended.");
            }
            isInitialLoad = false;
        }
    });

    // Enter Key Listeners
    document.getElementById('confirmPassword').addEventListener('keypress', (e) => { if (e.key === 'Enter') signup(); });
    document.getElementById('loginPassword').addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
