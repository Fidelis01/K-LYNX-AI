<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | K-LYNX AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00d4ff, #00ffaa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        select option {
            background: #0F172A;
            color: white;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d4ff, #00ffaa);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
            color: #0F172A;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg, .success-msg {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            font-size: 14px;
        }

        .error-msg {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4444;
            color: #ff8888;
        }

        .success-msg {
            background: rgba(0, 255, 100, 0.2);
            border: 1px solid #00ff64;
            color: #88ff88;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .login-link a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .password-requirements {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>K-LYNX AI++</h1>
        <div class="subtitle">Create your account to get started</div>
        
        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>
        
        <div class="input-group">
            <label>👤 Full Name</label>
            <input type="text" id="name" placeholder="Enter your full name" autofocus>
        </div>

        <div class="input-group">
            <label>📧 Email Address</label>
            <input type="email" id="email" placeholder="email@example.com">
        </div>

        <div class="input-group">
            <label>🌐 Preferred Language</label>
            <select id="language">
                <option value="English">English</option>
                <option value="Zulu">Zulu</option>
                <option value="Xhosa">Xhosa</option>
                <option value="Sesotho">Sesotho</option>
                <option value="Sepedi">Sepedi</option>
                <option value="Setswana">Setswana</option>
                <option value="Afrikaans">Afrikaans</option>
                <option value="Siswati">Siswati</option>
                <option value="isiNdebele">isiNdebele</option>
                <option value="Tshivenda">Tshivenda</option>
                <option value="Xitsonga">Xitsonga</option>
                <option value="Swahili">Swahili</option>
                <option value="Pidgin">Pidgin</option>
                <option value="Arabic">Arabic</option>
                <option value="Portuguese">Portuguese</option>
                <option value="Japanese">Japanese</option>
                <option value="Korean">Korean</option>
                <option value="Spanish">Spanish</option>
                <option value="Hindi">Hindi</option>
                <option value="Thai">Thai</option>
                <option value="German">German</option>
                <option value="Italian">Italian</option>
                <option value="Dutch">Dutch</option>
                <option value="Bengali">Bengali</option>
                <option value="French">French</option>
            </select>
        </div>

        <div class="input-group">
            <label>🔑 Password</label>
            <input type="password" id="password" placeholder="Create a password">
            <div class="password-requirements">Password must be at least 6 characters</div>
        </div>

        <div class="input-group">
            <label>✓ Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm your password">
        </div>

        <button id="signupBtn" onclick="signup()">Create Account</button>

        <div class="login-link">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script>
        // Check if already logged in
        const token = localStorage.getItem('token');
        if (token) {
            window.location.href = '/';
        }

        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function showSuccess(msg) {
            const successDiv = document.getElementById('successMsg');
            successDiv.textContent = msg;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }

        async function signup() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const language = document.getElementById('language').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validation
            if (!name || !email || !password) {
                showError('❌ Please fill in Name, Email, and Password');
                return;
            }

            if (password !== confirmPassword) {
                showError('❌ Passwords do not match');
                return;
            }

            if (password.length < 6) {
                showError('❌ Password must be at least 6 characters');
                return;
            }

            if (!email.includes('@') || !email.includes('.')) {
                showError('❌ Please enter a valid email address');
                return;
            }

            // Disable button and show loading
            const btn = document.getElementById('signupBtn');
            const originalText = btn.innerText;
            btn.innerText = 'Creating account...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: name,
                        email: email,
                        password: password,
                        language: language
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess('✅ Account created successfully! Redirecting to login...');
                    // Clear form
                    document.getElementById('name').value = '';
                    document.getElementById('email').value = '';
                    document.getElementById('password').value = '';
                    document.getElementById('confirmPassword').value = '';
                    
                    // Redirect to login page after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    showError('❌ ' + (data.error || 'Registration failed. Please try again.'));
                }
            } catch (err) {
                console.error('Signup error:', err);
                showError('❌ Cannot connect to server. Please make sure you are online.');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        // Enter key support
        const inputs = ['name', 'email', 'password', 'confirmPassword'];
        inputs.forEach(id => {
            document.getElementById(id).addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    if (id === 'confirmPassword') {
                        signup();
                    } else {
                        const nextIndex = inputs.indexOf(id) + 1;
                        if (nextIndex < inputs.length) {
                            document.getElementById(inputs[nextIndex]).focus();
                        }
                    }
                }
            });
        });
    </script>
</body>
</html>
