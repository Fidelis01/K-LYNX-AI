<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sign Up | K-LYNX AI++</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        background-color: #0F172A;
    }

    .signup-container {
        max-width: 450px;
        width: 100%;
    }

    .signup-card {
        background: rgba(15, 25, 45, 0.2);
        backdrop-filter: blur(12px);
        border-radius: 30px;
        padding: 35px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.05);
        text-align: center;
    }

    .logo h1 {
        font-size: 2.2rem;
        background: linear-gradient(135deg, #00d4ff, #00ffaa);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 5px;
    }

    .logo p {
        color: rgba(255, 255, 255, 0.8);
        font-size: 0.8rem;
        margin-bottom: 25px;
    }

    .input-group {
        margin-bottom: 18px;
        text-align: left;
    }

    .input-group label {
        display: block;
        color: rgba(255, 255, 255, 0.9);
        font-size: 0.85rem;
        margin-bottom: 6px;
    }

    .input-group input,
    .input-group select {
        width: 100%;
        padding: 12px 16px;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 40px;
        color: white;
        font-size: 0.95rem;
        outline: none;
        transition: all 0.2s;
    }

    .input-group select option {
        background: #0F172A;
        color: white;
    }

    .input-group input:focus,
    .input-group select:focus {
        border-color: #00d4ff;
        box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
    }

    .signup-btn {
        width: 100%;
        background: linear-gradient(135deg, #00d4ff, #00ffaa);
        border: none;
        border-radius: 40px;
        padding: 12px;
        font-weight: bold;
        font-size: 1rem;
        color: #0a0f1e;
        cursor: pointer;
        transition: transform 0.2s;
        margin-top: 10px;
    }

    .signup-btn:hover { transform: scale(1.02); }

    .login-link {
        margin-top: 18px;
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.8rem;
    }

    .login-link a { 
        color: #00d4ff; 
        text-decoration: none; 
        cursor: pointer;
        font-weight: bold;
    }

    .login-link a:hover {
        text-decoration: underline;
    }

    .error-msg, .success-msg {
        border-radius: 12px;
        padding: 10px;
        text-align: center;
        font-size: 0.8rem;
        margin-bottom: 20px;
        display: none;
    }

    .error-msg { 
        background: rgba(255, 80, 80, 0.2); 
        border: 1px solid rgba(255, 80, 80, 0.5); 
        color: #ff8888; 
    }
    
    .success-msg { 
        background: rgba(0, 255, 100, 0.2); 
        border: 1px solid rgba(0, 255, 100, 0.5); 
        color: #88ff88; 
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    #signupForm { animation: fadeIn 0.3s ease-in-out; }
</style>
</head>
<body>
<div class="signup-container">
    <div class="signup-card">
        <div class="logo">
            <h1>K-LYNX AI++</h1>
            <p>Create your account</p>
        </div>
        
        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>

        <!-- SIGNUP FORM -->
        <div id="signupForm">
            <div class="input-group">
                <label>👤 Full Name</label>
                <input type="text" id="fullname" placeholder="Enter your full name" autofocus>
            </div>

            <div class="input-group">
                <label>📧 Email Address</label>
                <input type="email" id="email" placeholder="email@example.com">
            </div>

            <div class="input-group">
                <label>🌐 Preferred Language</label>
                <select id="language">
                    <option value="English">English</option>
                    <option value="Zulu">Zulu</option>
                    <option value="Xhosa">Xhosa</option>
                    <option value="Sesotho">Sesotho</option>
                    <option value="Sepedi">Sepedi</option>
                    <option value="Setswana">Setswana</option>
                    <option value="Afrikaans">Afrikaans</option>
                    <option value="Siswati">Siswati</option>
                    <option value="isiNdebele">isiNdebele</option>
                    <option value="Tshivenda">Tshivenda</option>
                    <option value="Xitsonga">Xitsonga</option>
                    <option value="Swahili">Swahili</option>
                    <option value="Pidgin">Pidgin</option>
                    <option value="Arabic">Arabic</option>
                    <option value="Portuguese">Portuguese</option>
                    <option value="Japanese">Japanese</option>
                    <option value="Korean">Korean</option>
                    <option value="Spanish">Spanish</option>
                    <option value="Hindi">Hindi</option>
                    <option value="Thai">Thai</option>
                    <option value="German">German</option>
                    <option value="Italian">Italian</option>
                    <option value="Dutch">Dutch</option>
                    <option value="Bengali">Bengali</option>
                    <option value="French">French</option>
                </select>
            </div>

            <div class="input-group">
                <label>🔑 Password</label>
                <input type="password" id="password" placeholder="Create a password">
            </div>

            <div class="input-group">
                <label>✓ Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password">
            </div>

            <button class="signup-btn" onclick="signup()">Create Account</button>
        </div>

        <div class="login-link">
            Already have an account? <a href="/login.html">Login</a>
        </div>
    </div>
</div>

<script>
    // Your Render server URL
    const API_BASE_URL = 'https://klynxai.onrender.com';
    
    // Check if already logged in
    const token = localStorage.getItem('token');
    if (token) {
        window.location.href = `${API_BASE_URL}/index.html`;
    }

    function showError(msg) {
        const errorDiv = document.getElementById('errorMsg');
        errorDiv.textContent = msg;
        errorDiv.style.display = 'block';
        setTimeout(() => { errorDiv.style.display = 'none'; }, 4000);
    }

    function showSuccess(msg) {
        const successDiv = document.getElementById('successMsg');
        successDiv.textContent = msg;
        successDiv.style.display = 'block';
        setTimeout(() => { successDiv.style.display = 'none'; }, 3000);
    }

    // SIGNUP FUNCTION
    async function signup() {
        // Get values
        const name = document.getElementById('fullname').value.trim();
        const email = document.getElementById('email').value.trim();
        const language = document.getElementById('language').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        // Validation
        if (!name || !email || !password) {
            showError('❌ Please fill in Name, Email, and Password');
            return;
        }

        if (password !== confirmPassword) {
            showError('❌ Passwords do not match');
            return;
        }

        if (password.length < 6) {
            showError('❌ Password must be at least 6 characters');
            return;
        }

        // Show loading state
        const btn = event.target;
        const originalText = btn.innerText;
        btn.innerText = 'Creating account...';
        btn.disabled = true;

        try {
            console.log('Sending registration to:', `${API_BASE_URL}/auth/register`);
            
            const response = await fetch(`${API_BASE_URL}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password, language })
            });

            console.log('Response status:', response.status);
            const data = await response.json();
            console.log('Response data:', data);

            if (response.ok) {
                showSuccess('✅ Registration successful! Please check your email for verification.');
                setTimeout(() => { 
                    window.location.href = `${API_BASE_URL}/login.html`; 
                }, 3000);
            } else {
                showError('❌ ' + (data.message || 'Registration failed'));
            }
        } catch (err) {
            console.error('Fetch error:', err);
            showError('❌ Cannot connect to server. Please make sure you are online.');
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }

    // Enter key support
    document.getElementById('confirmPassword').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') signup();
    });
</script>
</body>
</html>
