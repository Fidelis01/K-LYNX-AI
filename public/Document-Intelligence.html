<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-LYNX AI++ - Document Intelligence</title>
    <style>
        *{box-sizing:border-box;font-family:'Open Sans',Arial,sans-serif;}
        body{margin:0;padding:20px;color:white;}
        .bg{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#0F172A 0%,#1E293B 100%);z-index:-1;}
        .glass{background:rgba(255,255,255,0.05);backdrop-filter:blur(12px);border-radius:20px;border:1px solid rgba(0,212,255,0.3);padding:20px;margin:20px auto;width:90%;max-width:900px;transition:all 0.3s ease;}
        .glass.large{max-width:1000px;}
        .glass:hover{border-color:rgba(0,212,255,0.6);}
        .header{text-align:center;font-size:22px;font-weight:bold;margin-bottom:15px;background:linear-gradient(135deg,#00d4ff,#00ffaa);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .upload-btn{display:flex;flex-direction:column;align-items:center;cursor:pointer;padding:20px;border-radius:15px;}
        .upload-btn:hover{background:rgba(0,212,255,0.1);}
        .clip{font-size:40px;}
        .btn-row{display:flex;gap:15px;justify-content:center;margin-top:15px;flex-wrap:wrap;}
        .glass-btn{background:linear-gradient(135deg,#00d4ff,#00ffaa);border:none;padding:10px 20px;border-radius:40px;color:#0F172A;cursor:pointer;font-weight:bold;transition:all 0.3s ease;}
        .glass-btn:hover{transform:scale(1.05);}
        .glass-btn:disabled{opacity:0.5;cursor:not-allowed;}
        .output{min-height:250px;white-space:pre-wrap;padding:15px;background:rgba(0,0,0,0.3);border-radius:10px;border:1px solid rgba(0,212,255,0.3);max-height:350px;overflow-y:auto;font-size:14px;line-height:1.5;}
        .chat-box{height:280px;overflow-y:auto;padding:15px;background:rgba(0,0,0,0.3);border-radius:15px;border:1px solid rgba(0,212,255,0.3);}
        .chat-input{display:flex;margin-top:10px;gap:10px;padding:10px;background:rgba(0,0,0,0.3);border-radius:15px;border:1px solid rgba(0,212,255,0.3);}
        .chat-input textarea{flex:1;padding:10px;border:none;border-radius:12px;background:rgba(255,255,255,0.1);color:white;resize:none;min-height:40px;}
        .msg{margin:8px 0;display:flex;animation:fadeIn 0.5s ease;}
        .msg.user{justify-content:flex-end;}
        .msg.ai{justify-content:flex-start;}
        .bubble{max-width:70%;padding:10px 15px;border-radius:18px;word-wrap:break-word;white-space:pre-wrap;}
        .bubble.user{background:linear-gradient(135deg,#00d4ff,#00ffaa);color:#0F172A;}
        .bubble.ai{background:rgba(255,255,255,0.1);border:1px solid rgba(0,212,255,0.3);}
        .typing-indicator{display:flex;align-items:center;gap:4px;padding:10px 15px;background:rgba(255,255,255,0.1);border-radius:18px;width:fit-content;}
        .typing-indicator span{width:8px;height:8px;background:#00d4ff;border-radius:50%;animation:typing 1.4s infinite;}
        .typing-indicator span:nth-child(2){animation-delay:0.2s;}
        .typing-indicator span:nth-child(3){animation-delay:0.4s;}
        @keyframes typing{0%,60%,100%{transform:translateY(0);opacity:0.4;}30%{transform:translateY(-10px);opacity:1;}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
        .back-btn{position:fixed;top:20px;left:20px;display:flex;align-items:center;gap:5px;padding:8px 15px;background:rgba(0,0,0,0.3);border:1px solid rgba(0,212,255,0.5);border-radius:20px;color:white;cursor:pointer;font-size:14px;z-index:1000;text-decoration:none;}
        .back-btn:hover{background:rgba(0,212,255,0.2);}
        .main-content{padding-top:60px;}
        #fileName{color:#00d4ff;font-weight:bold;}
        .loading-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;justify-content:center;align-items:center;z-index:9999;flex-direction:column;}
        .spinner{width:50px;height:50px;border:3px solid rgba(0,212,255,0.3);border-top-color:#00d4ff;border-radius:50%;animation:spin 1s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .loading-text{margin-top:20px;color:#00d4ff;}
    </style>
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay" style="display:none;"><div class="spinner"></div><div class="loading-text">Loading...</div></div>
    <a href="/" class="back-btn"><span>←</span><span>Back</span></a>
    <div class="bg"></div>
    <div class="main-content">
        <div class="glass">
            <div class="header">📄 Document Intelligence</div>
            <label class="upload-btn"><div class="clip">📎</div><div>Upload (TXT/PDF/DOCX)</div><input type="file" id="fileInput" accept=".txt,.pdf,.docx" hidden></label>
            <div id="uploadStatus" style="text-align:center;font-size:12px;margin-top:10px;"></div>
        </div>
        <div class="glass">
            <div class="header">📋 Status</div>
            <div id="fileName">No document uploaded</div>
            <div id="docInfo" style="font-size:12px;"></div>
            <div class="btn-row">
                <button class="glass-btn" id="simplifyBtn" disabled>Simplify ✨</button>
                <button class="glass-btn" id="deleteBtn">Delete 🗑️</button>
            </div>
        </div>
        <div class="glass large">
            <div class="header">📝 Simplified</div>
            <div class="output" id="output"><em>Upload and click Simplify</em></div>
            <div class="btn-row"><button class="glass-btn" id="downloadBtn" disabled>Download 📥</button></div>
            <div class="chat">
                <div class="header" style="font-size:18px;">💬 Ask Questions</div>
                <div class="chat-box" id="chatBox"><div class="msg ai"><div class="bubble ai">👋 Upload a document and ask me anything!</div></div></div>
                <div class="chat-input">
                    <textarea id="chatInput" placeholder="Ask about the document..." rows="1" disabled></textarea>
                    <button class="glass-btn" id="chatSend" disabled>Send</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        // Auth check
        if(!localStorage.getItem('token') && !localStorage.getItem('user')){
            document.getElementById('loadingOverlay').style.display='flex';
            setTimeout(()=>window.location.href='/login.html',1000);
        }else{document.getElementById('loadingOverlay').style.display='none';}
        
        const API_URL='https://jai1-sh81.onrender.com';
        let clientId=localStorage.getItem('klynx_client_id');
        if(!clientId){clientId='klynx_'+Date.now()+'_'+Math.random().toString(36).substr(2,9);localStorage.setItem('klynx_client_id',clientId);}
        
        let currentFilename="",isProcessing=false,lastSimplified="";
        const fileInput=document.getElementById("fileInput"),fileName=document.getElementById("fileName"),docInfo=document.getElementById("docInfo");
        const simplifyBtn=document.getElementById("simplifyBtn"),deleteBtn=document.getElementById("deleteBtn"),output=document.getElementById("output");
        const downloadBtn=document.getElementById("downloadBtn"),chatBox=document.getElementById("chatBox"),chatInput=document.getElementById("chatInput");
        const chatSend=document.getElementById("chatSend"),uploadStatus=document.getElementById("uploadStatus");
        
        chatInput.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';});
        
        // Notify JAI
        fetch(`${API_URL}/api/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:'Entering Document Intelligence',clientId,options:{speech:false}})}).catch(e=>console.log);
        
        fileInput.addEventListener("change", async(e)=>{
            const file=e.target.files[0];
            if(!file)return;
            currentFilename=file.name;
            fileName.innerText=file.name;
            docInfo.innerText=`${(file.size/1024).toFixed(2)} KB | Uploading...`;
            uploadStatus.innerHTML='⏳ Uploading...';
            const reader=new FileReader();
            reader.onload=async function(e){
                try{
                    const res=await fetch(`${API_URL}/api/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:`upload_doc: ${currentFilename} : ${e.target.result.split(',')[1]}`,clientId,options:{speech:false}})});
                    const data=await res.json();
                    if(data.response && data.response.includes('Document uploaded')){
                        docInfo.innerHTML=`${(file.size/1024).toFixed(2)} KB | ✅`;
                        uploadStatus.innerHTML='✅ Ready';
                        simplifyBtn.disabled=false;
                        chatInput.disabled=false;
                        chatSend.disabled=false;
                        addAIMessage(`✅ "${currentFilename}" uploaded! Click Simplify.`);
                    }else throw new Error('Upload failed');
                }catch(error){docInfo.innerHTML=`❌ Upload failed`;addAIMessage("Upload failed.");}
                setTimeout(()=>uploadStatus.innerHTML='',3000);
            };
            reader.readAsDataURL(file);
        });
        
        simplifyBtn.onclick=async()=>{
            if(!currentFilename)return alert("Upload a document first");
            if(isProcessing)return;
            isProcessing=true;simplifyBtn.disabled=true;simplifyBtn.textContent='Simplifying...';
            output.innerHTML='<em>Generating...</em>';
            try{
                const res=await fetch(`${API_URL}/api/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:"Simplify this document step by step.",clientId,options:{speech:false}})});
                const data=await res.json();
                if(data.response){lastSimplified=data.response;output.innerHTML=lastSimplified.replace(/\n/g,'<br>');downloadBtn.disabled=false;addAIMessage("✅ Simplified! Check above.");}
                else output.innerHTML="Could not simplify.";
            }catch(error){output.innerHTML="Error.";}
            finally{isProcessing=false;simplifyBtn.disabled=false;simplifyBtn.textContent='Simplify ✨';}
        };
        
        deleteBtn.onclick=()=>{
            fileInput.value="";fileName.innerText="No document";docInfo.innerText="";currentFilename="";
            output.innerHTML="<em>Upload and click Simplify</em>";simplifyBtn.disabled=true;chatInput.disabled=true;chatSend.disabled=true;
            downloadBtn.disabled=true;lastSimplified="";
            chatBox.innerHTML=`<div class="msg ai"><div class="bubble ai">👋 Upload a document and ask me anything!</div></div>`;
            addAIMessage("Document deleted.");
        };
        
        downloadBtn.onclick=()=>{
            if(!lastSimplified){alert("Simplify document first");return;}
            const blob=new Blob([lastSimplified],{type:'text/plain'});
            const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`Simplified-${currentFilename||'document'}.txt`;
            a.click();URL.revokeObjectURL(a.href);
        };
        
        let typing=null;
        function showTyping(){if(typing)return;const d=document.createElement('div');d.className='msg ai';d.id='typing';d.innerHTML=`<div class="typing-indicator"><span></span><span></span><span></span></div>`;chatBox.appendChild(d);chatBox.scrollTop=chatBox.scrollHeight;typing=d;}
        function hideTyping(){if(typing){typing.remove();typing=null;}}
        
        chatSend.onclick=async()=>{
            const msg=chatInput.value.trim();
            if(!msg)return;
            if(!currentFilename){addAIMessage("Upload a document first.");return;}
            addUserMessage(msg);chatInput.value="";chatInput.style.height='auto';showTyping();
            try{
                const res=await fetch(`${API_URL}/api/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,clientId,options:{speech:false}})});
                const data=await res.json();hideTyping();
                addAIMessage(data.response||"Sorry, couldn't answer.");
            }catch(error){hideTyping();addAIMessage("Connection error.");}
        };
        
        chatInput.addEventListener('keydown',(e)=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();chatSend.click();}});
        
        function addUserMessage(t){const d=document.createElement('div');d.className='msg user';d.innerHTML=`<div class="bubble user">${escapeHtml(t).replace(/\n/g,'<br>')}</div>`;chatBox.appendChild(d);chatBox.scrollTop=chatBox.scrollHeight;}
        function addAIMessage(t){const d=document.createElement('div');d.className='msg ai';d.innerHTML=`<div class="bubble ai">${escapeHtml(t).replace(/\n/g,'<br>')}</div>`;chatBox.appendChild(d);chatBox.scrollTop=chatBox.scrollHeight;}
        function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
    </script>
</body>
</html>
