<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat | K-LYNX AI++</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Open Sans', sans-serif;
        background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
        height: 100vh;
        overflow: hidden;
    }

    .chat-header {
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(10px);
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .logo {
        font-size: 24px;
        font-weight: 800;
        background: linear-gradient(135deg, #FFD700, #FFA500);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }

    .back-btn {
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        padding: 8px 20px;
        border-radius: 20px;
        color: white;
        text-decoration: none;
        transition: 0.3s;
    }

    .back-btn:hover {
        background: rgba(255,255,255,0.2);
    }

    .profile-icon {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(135deg, #FFD700, #FFA500);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
    }

    .chat-container {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 70px);
        max-width: 1200px;
        margin: 0 auto;
        width: 100%;
    }

    .messages-area {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .message {
        display: flex;
        animation: fadeIn 0.3s ease;
    }

    .message.user {
        justify-content: flex-end;
    }

    .message.ai {
        justify-content: flex-start;
    }

    .message-content {
        max-width: 70%;
        padding: 12px 18px;
        border-radius: 20px;
        word-wrap: break-word;
    }

    .user .message-content {
        background: linear-gradient(135deg, #FFD700, #FFA500);
        color: #0F172A;
        border-bottom-right-radius: 5px;
    }

    .ai .message-content {
        background: rgba(255,255,255,0.1);
        color: white;
        border-bottom-left-radius: 5px;
    }

    .message-time {
        font-size: 10px;
        opacity: 0.6;
        margin-top: 5px;
        display: block;
    }

    .typing-indicator {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 12px 18px;
        background: rgba(255,255,255,0.1);
        border-radius: 20px;
        width: fit-content;
    }

    .typing-indicator span {
        width: 8px;
        height: 8px;
        background: white;
        border-radius: 50%;
        animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1); }
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .input-area {
        padding: 20px;
        background: rgba(15, 23, 42, 0.95);
        border-top: 1px solid rgba(255,255,255,0.1);
        display: flex;
        gap: 15px;
        align-items: center;
    }

    .input-area input {
        flex: 1;
        padding: 12px 20px;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 30px;
        color: white;
        font-size: 16px;
        outline: none;
        transition: 0.3s;
    }

    .input-area input:focus {
        border-color: #FFD700;
        box-shadow: 0 0 10px rgba(255,215,0,0.3);
    }

    .input-area button {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        background: linear-gradient(135deg, #FFD700, #FFA500);
        border: none;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .input-area button:hover {
        transform: scale(1.05);
    }

    .suggestions {
        padding: 10px 20px;
        display: flex;
        gap: 10px;
        overflow-x: auto;
        background: rgba(0,0,0,0.2);
    }

    .suggestion-chip {
        background: rgba(255,255,255,0.1);
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 12px;
        cursor: pointer;
        white-space: nowrap;
        transition: 0.3s;
    }

    .suggestion-chip:hover {
        background: rgba(255,215,0,0.3);
        color: #FFD700;
    }

    .messages-area::-webkit-scrollbar {
        width: 6px;
    }

    .messages-area::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.1);
        border-radius: 10px;
    }

    .messages-area::-webkit-scrollbar-thumb {
        background: #FFD700;
        border-radius: 10px;
    }

    @media (max-width: 768px) {
        .message-content { max-width: 85%; }
        .chat-header { padding: 12px 20px; }
        .logo { font-size: 20px; }
    }
</style>
</head>
<body>

<div class="chat-header">
    <div class="logo">K-LYNX AI++ <span style="font-size:12px;">chat</span></div>
    <a href="/dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
    <div class="profile-icon" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i>
    </div>
</div>

<div class="chat-container">
    <div class="messages-area" id="messagesArea">
        <div class="message ai">
            <div class="message-content">
                Hello! I'm K-LYNX AI assistant. How can I help you today?
                <span class="message-time">Just now</span>
            </div>
        </div>
    </div>

    <div class="suggestions">
        <div class="suggestion-chip" onclick="sendSuggestion('What is K-LYNX AI?')">What is K-LYNX AI?</div>
        <div class="suggestion-chip" onclick="sendSuggestion('Help me write an email')">Help me write an email</div>
        <div class="suggestion-chip" onclick="sendSuggestion('Explain AI in simple terms')">Explain AI simply</div>
        <div class="suggestion-chip" onclick="sendSuggestion('Create a to-do list')">Create a to-do list</div>
        <div class="suggestion-chip" onclick="sendSuggestion('Tell me a joke')">Tell me a joke</div>
    </div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</div>

<script>
    // Check if user is logged in
    const token = localStorage.getItem('token');
    const user = localStorage.getItem('user');
    
    if (!token && !user) {
        window.location.href = '/login.html';
    }

    let userData = null;
    if (user) {
        try {
            userData = JSON.parse(user);
        } catch(e) {}
    }

    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = '/login.html';
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    function sendSuggestion(text) {
        document.getElementById('messageInput').value = text;
        sendMessage();
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const message = input.value.trim();
        
        if (!message) return;
        
        input.value = '';
        addMessage(message, 'user');
        showTypingIndicator();
        
        let retries = 3;
        let delay = 1000;
        
        for (let i = 0; i < retries; i++) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 30000);
                
                const response = await fetch('https://jai1-sh81.onrender.com/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: message,
                        user: userData ? userData.name : 'Anonymous'
                    }),
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                if (response.ok) {
                    const data = await response.json();
                    hideTypingIndicator();
                    const reply = data.reply || data.response || data.message || "I received your message!";
                    addMessage(reply, 'ai');
                    return;
                } else if (response.status === 503 || response.status === 429) {
                    // Service unavailable or rate limited, wait and retry
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                    continue;
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    if (i === retries - 1) {
                        hideTypingIndicator();
                        addMessage("⚠️ The request timed out. Please try again.", 'ai');
                    } else {
                        await new Promise(resolve => setTimeout(resolve, delay));
                        delay *= 2;
                    }
                } else if (i === retries - 1) {
                    hideTypingIndicator();
                    addMessage("⚠️ The AI service is temporarily unavailable. Please try again in a few moments.", 'ai');
                } else {
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        }
    }

    function addMessage(text, sender) {
        const messagesArea = document.getElementById('messagesArea');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender}`;
        
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        messageDiv.innerHTML = `
            <div class="message-content">
                ${escapeHtml(text)}
                <span class="message-time">${time}</span>
            </div>
        `;
        
        messagesArea.appendChild(messageDiv);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function showTypingIndicator() {
        const messagesArea = document.getElementById('messagesArea');
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message ai';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `
            <div class="typing-indicator">
                <span></span><span></span><span></span>
            </div>
        `;
        messagesArea.appendChild(typingDiv);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function hideTypingIndicator() {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) {
            indicator.remove();
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>
</body>
</html>
