<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat | K-LYNX AI++</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Open Sans', sans-serif;
        background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
        height: 100vh;
        overflow: hidden;
        position: relative;
    }

    /* Profile Icon - Top Right */
    .profile-icon {
        position: fixed;
        top: 20px;
        right: 20px;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        background: linear-gradient(135deg, #00d4ff, #00ffaa);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: 0.3s;
        z-index: 100;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .profile-icon:hover {
        transform: scale(1.1);
        box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
    }

    .profile-icon i {
        color: #0F172A;
        font-size: 20px;
    }

    /* Back Button - Top Left */
    .back-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        padding: 10px 20px;
        border-radius: 25px;
        color: white;
        text-decoration: none;
        transition: 0.3s;
        z-index: 100;
        font-size: 14px;
        backdrop-filter: blur(5px);
    }

    .back-btn:hover {
        background: rgba(0, 212, 255, 0.2);
        border-color: #00d4ff;
    }

    .chat-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        max-width: 1000px;
        margin: 0 auto;
        width: 100%;
        padding: 80px 20px 20px 20px;
    }

    .messages-area {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .message {
        display: flex;
        animation: fadeIn 0.3s ease;
    }

    .message.user {
        justify-content: flex-end;
    }

    .message.ai {
        justify-content: flex-start;
    }

    .message-content {
        max-width: 70%;
        padding: 12px 18px;
        border-radius: 20px;
        word-wrap: break-word;
    }

    .user .message-content {
        background: linear-gradient(135deg, #00d4ff, #00ffaa);
        color: #0F172A;
        border-bottom-right-radius: 5px;
    }

    .ai .message-content {
        background: rgba(255,255,255,0.1);
        color: white;
        border-bottom-left-radius: 5px;
    }

    .message-time {
        font-size: 10px;
        opacity: 0.6;
        margin-top: 5px;
        display: block;
    }

    .typing-indicator {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 12px 18px;
        background: rgba(255,255,255,0.1);
        border-radius: 20px;
        width: fit-content;
    }

    .typing-indicator span {
        width: 8px;
        height: 8px;
        background: #00d4ff;
        border-radius: 50%;
        animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1); }
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .input-area {
        padding: 20px;
        background: rgba(15, 23, 42, 0.95);
        border-top: 1px solid rgba(255,255,255,0.1);
        border-radius: 20px;
        display: flex;
        gap: 15px;
        align-items: center;
        margin-top: 10px;
    }

    .input-area input {
        flex: 1;
        padding: 14px 20px;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 30px;
        color: white;
        font-size: 16px;
        outline: none;
        transition: 0.3s;
    }

    .input-area input:focus {
        border-color: #00d4ff;
        box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
    }

    .input-area button {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: linear-gradient(135deg, #00d4ff, #00ffaa);
        border: none;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #0F172A;
        font-size: 18px;
    }

    .input-area button:hover {
        transform: scale(1.05);
        box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
    }

    .suggestions {
        padding: 10px 20px;
        display: flex;
        gap: 10px;
        overflow-x: auto;
        margin-bottom: 10px;
    }

    .suggestion-chip {
        background: rgba(255,255,255,0.1);
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 12px;
        cursor: pointer;
        white-space: nowrap;
        transition: 0.3s;
    }

    .suggestion-chip:hover {
        background: rgba(0, 212, 255, 0.3);
        color: #00d4ff;
    }

    .messages-area::-webkit-scrollbar {
        width: 6px;
    }

    .messages-area::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.1);
        border-radius: 10px;
    }

    .messages-area::-webkit-scrollbar-thumb {
        background: #00d4ff;
        border-radius: 10px;
    }

    @media (max-width: 768px) {
        .message-content { max-width: 85%; }
        .chat-container { padding: 70px 15px 15px 15px; }
        .profile-icon { width: 40px; height: 40px; top: 15px; right: 15px; }
        .back-btn { top: 15px; left: 15px; padding: 8px 16px; font-size: 12px; }
    }
</style>
</head>
<body>

    <!-- Back Button -->
    <a href="/index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
    
    <!-- Profile Icon -->
    <div class="profile-icon" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i>
    </div>

    <div class="chat-container">
        <div class="messages-area" id="messagesArea">
            <div class="message ai">
                <div class="message-content">
                    Hello! I'm K-LYNX AI assistant. How can I help you today?
                    <span class="message-time">Just now</span>
                </div>
            </div>
        </div>

        <div class="suggestions">
            <div class="suggestion-chip" onclick="sendSuggestion('What is K-LYNX AI?')">What is K-LYNX AI?</div>
            <div class="suggestion-chip" onclick="sendSuggestion('Help me write an email')">Help me write an email</div>
            <div class="suggestion-chip" onclick="sendSuggestion('Explain AI in simple terms')">Explain AI simply</div>
            <div class="suggestion-chip" onclick="sendSuggestion('Create a to-do list')">Create a to-do list</div>
            <div class="suggestion-chip" onclick="sendSuggestion('Tell me a joke')">Tell me a joke</div>
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://klynxai.onrender.com';
        
        // Check if user is logged in
        const token = localStorage.getItem('token');
        const user = localStorage.getItem('user');
        
        if (!token && !user) {
            window.location.href = `${API_BASE_URL}/login.html`;
        }

        let userData = null;
        if (user) {
            try {
                userData = JSON.parse(user);
            } catch(e) {}
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = `${API_BASE_URL}/login.html`;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function sendSuggestion(text) {
            document.getElementById('messageInput').value = text;
            sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            input.value = '';
            addMessage(message, 'user');
            showTypingIndicator();
            
            let retries = 3;
            let delay = 1000;
            
            for (let i = 0; i < retries; i++) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 30000);
                    
                    const response = await fetch(`${API_BASE_URL}/api/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            message: message,
                            user: userData ? userData.name : 'Anonymous'
                        }),
                        signal: controller.signal
                    });
                    
                    clearTimeout(timeoutId);
                    
                    if (response.ok) {
                        const data = await response.json();
                        hideTypingIndicator();
                        const reply = data.reply || data.response || data.message || "I received your message!";
                        addMessage(reply, 'ai');
                        return;
                    } else if (response.status === 503 || response.status === 429) {
                        await new Promise(resolve => setTimeout(resolve, delay));
                        delay *= 2;
                        continue;
                    } else {
                        throw new Error(`HTTP ${response.status}`);
                    }
                } catch (error) {
                    if (error.name === 'AbortError') {
                        if (i === retries - 1) {
                            hideTypingIndicator();
                            addMessage("⚠️ The request timed out. Please try again.", 'ai');
                        } else {
                            await new Promise(resolve => setTimeout(resolve, delay));
                            delay *= 2;
                        }
                    } else if (i === retries - 1) {
                        hideTypingIndicator();
                        addMessage(getFallbackResponse(message), 'ai');
                    } else {
                        await new Promise(resolve => setTimeout(resolve, delay));
                        delay *= 2;
                    }
                }
            }
        }

        function getFallbackResponse(message) {
            const msg = message.toLowerCase();
            
            if (msg.includes('hello') || msg.includes('hi') || msg.includes('hey')) {
                return "Hello! 👋 How can I assist you today?";
            }
            else if (msg.includes('how are you')) {
                return "I'm doing great, thank you for asking! I'm ready to help you with anything you need.";
            }
            else if (msg.includes('what is k-lynx') || msg.includes('what can you do')) {
                return "K-LYNX AI++ is a powerful AI assistant that can help with writing, creativity, document analysis, scheduling, career advice, and much more!";
            }
            else if (msg.includes('email')) {
                return "I'd be happy to help you write an email! Please tell me who the recipient is and what the purpose is.";
            }
            else if (msg.includes('joke')) {
                const jokes = [
                    "Why don't scientists trust atoms? Because they make up everything! 😄",
                    "What do you call a fake noodle? An impasta! 🍝",
                    "Why did the scarecrow win an award? He was outstanding in his field! 🌾",
                    "What do you call a bear with no teeth? A gummy bear! 🐻"
                ];
                return jokes[Math.floor(Math.random() * jokes.length)];
            }
            else if (msg.includes('love') || msg.includes('like')) {
                return "That's wonderful! I'm here to support you. ❤️";
            }
            else {
                return "Thanks for your message! I'm processing your request. Please try again in a moment.";
            }
        }

        function addMessage(text, sender) {
            const messagesArea = document.getElementById('messagesArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            messageDiv.innerHTML = `
                <div class="message-content">
                    ${escapeHtml(text)}
                    <span class="message-time">${time}</span>
                </div>
            `;
            
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function showTypingIndicator() {
            const messagesArea = document.getElementById('messagesArea');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            messagesArea.appendChild(typingDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
