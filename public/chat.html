<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat | K-LYNX AI++</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    /* ALL YOUR ORIGINAL CSS REMAINS EXACTLY THE SAME */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Open Sans', sans-serif;
        background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
        height: 100vh;
        overflow: hidden;
        position: relative;
    }
    .profile-icon {
        position: fixed; top: 20px; right: 20px; width: 45px; height: 45px; border-radius: 50%;
        background: linear-gradient(135deg, #00d4ff, #00ffaa);
        display: flex; align-items: center; justify-content: center; cursor: pointer;
        transition: 0.3s; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .profile-icon:hover { transform: scale(1.1); box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); }
    .profile-icon i { color: #0F172A; font-size: 20px; }
    .back-btn {
        position: fixed; top: 20px; left: 20px; background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 25px;
        color: white; text-decoration: none; transition: 0.3s; z-index: 100; font-size: 14px; backdrop-filter: blur(5px);
    }
    .back-btn:hover { background: rgba(0, 212, 255, 0.2); border-color: #00d4ff; }
    .chat-container {
        display: flex; flex-direction: column; height: 100vh; max-width: 1000px;
        margin: 0 auto; width: 100%; padding: 80px 20px 20px 20px;
    }
    .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    .message { display: flex; animation: fadeIn 0.3s ease; }
    .message.user { justify-content: flex-end; }
    .message.ai { justify-content: flex-start; }
    .message-content { max-width: 70%; padding: 12px 18px; border-radius: 20px; word-wrap: break-word; line-height: 1.5; }
    .user .message-content { background: linear-gradient(135deg, #00d4ff, #00ffaa); color: #0F172A; border-bottom-right-radius: 5px; }
    .ai .message-content { background: rgba(255,255,255,0.1); color: white; border-bottom-left-radius: 5px; }
    .message-time { font-size: 10px; opacity: 0.6; margin-top: 5px; display: block; }
    .typing-indicator { display: flex; align-items: center; gap: 5px; padding: 12px 18px; background: rgba(255,255,255,0.1); border-radius: 20px; width: fit-content; }
    .typing-indicator span { width: 8px; height: 8px; background: #00d4ff; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .input-area {
        padding: 20px; background: rgba(15, 23, 42, 0.95); border-top: 1px solid rgba(255,255,255,0.1);
        border-radius: 20px; display: flex; gap: 15px; align-items: center; margin-top: 10px;
    }
    
    .input-area input {
        flex: 1; padding: 14px 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
        border-radius: 30px; color: white; font-size: 16px; outline: none; transition: 0.3s;
    }
    .input-area input:focus { border-color: #00d4ff; box-shadow: 0 0 10px rgba(0, 212, 255, 0.3); }
    .input-area button {
        width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, #00d4ff, #00ffaa);
        border: none; cursor: pointer; transition: 0.3s; display: flex; align-items: center; flex-shrink: 0; justify-content: center; color: #0F172A; font-size: 18px;
    }
    .input-area button:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(0, 212, 255, 0.4); ;}
    .suggestions { padding: 10px 20px; display: flex; gap: 10px; overflow-x: auto; margin-bottom: 10px; }
    .suggestion-chip { background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; transition: 0.3s; }
    .suggestion-chip:hover { background: rgba(0, 212, 255, 0.3); color: #00d4ff; }
    .messages-area::-webkit-scrollbar { width: 6px; }
    .messages-area::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 10px; }
    .messages-area::-webkit-scrollbar-thumb { background: #00d4ff; border-radius: 10px; }
    @media (max-width: 768px) {
        .message-content { max-width: 85%; }
        .chat-container { padding: 70px 15px 15px 15px; }
        .profile-icon { width: 40px; height: 40px; top: 15px; right: 15px; }
        .back-btn { top: 15px; left: 15px; padding: 8px 16px; font-size: 12px; }
    }
</style>
</head>
<body>

    <a href="/index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
    
    <div class="profile-icon" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i>
    </div>

    <div class="chat-container">
        <div class="messages-area" id="messagesArea">
            <div class="message ai">
                <div class="message-content">
                    Hello! I'm K-LYNX AI++. How can I help you today?
                    <span class="message-time">Just now</span>
                </div>
            </div>
        </div>

        <div class="suggestions">
            <div class="suggestion-chip" onclick="sendSuggestion('What is Python?')">What is Python?</div>
            <div class="suggestion-chip" onclick="sendSuggestion('Tell me a joke')">Tell me a joke</div>
            <div class="suggestion-chip" onclick="sendSuggestion('100 USD to Naira')">100 USD to Naira</div>
            <div class="suggestion-chip" onclick="sendSuggestion('Weather in Lagos')">Weather in Lagos</div>
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
    // 1. Load history from local storage, or start empty
    let chatHistory = JSON.parse(localStorage.getItem('klynx_chat_history')) || [];

    // 2. Render history when the page loads
    window.onload = () => {
        if (chatHistory.length === 0) {
            // First time user
            addMessage("Hello! I'm K-LYNX AI++. How can I help you today?", 'ai');
        } else {
            // Load saved messages
            chatHistory.forEach(msg => {
                const sender = msg.role === 'user' ? 'user' : 'ai';
                addMessage(msg.parts[0].text, sender);
            });
        }
    };

    window.logout = function() {
        if (confirm('Are you sure you want to logout?')) {
            localStorage.removeItem('klynx_chat_history'); // Clear chat on logout
            window.location.href = '/';
        }
    }

    window.handleKeyPress = function(event) {
        if (event.key === 'Enter') sendMessage();
    }

    window.sendSuggestion = function(text) {
        document.getElementById('messageInput').value = text;
        sendMessage();
    }

    window.sendMessage = async function() {
        const input = document.getElementById('messageInput');
        const message = input.value.trim();
        
        if (!message) return;
        
        input.value = '';
        addMessage(message, 'user');
        showTypingIndicator();
        
        try {
            // Send message AND history to your backend
            const response = await fetch('/api/ai/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: message, 
                    history: chatHistory 
                })
            });
            
            const data = await response.json();
            hideTypingIndicator();
            
            if (data.success) {
                addMessage(data.reply, 'ai');
                
                // Update our history array (Google SDK format requires 'user' and 'model' roles)
                chatHistory.push({ role: "user", parts: [{ text: message }] });
                chatHistory.push({ role: "model", parts: [{ text: data.reply }] });
                
                // Save the updated history to local storage
                localStorage.setItem('klynx_chat_history', JSON.stringify(chatHistory));
            } else {
                addMessage("⚠️ Error: " + data.message, 'ai');
            }
            
        } catch (error) {
            console.error("Fetch Error:", error);
            hideTypingIndicator();
            addMessage("⚠️ Backend unreachable. Is your Node.js server running on port 5000?", 'ai');
        }
    }

    // --- KEEP YOUR EXISTING HELPER FUNCTIONS ---
    function addMessage(text, sender) {
        const messagesArea = document.getElementById('messagesArea');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender}`;
        
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        let formattedText = escapeHtml(text)
            .replace(/\n/g, '<br>')
            .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>'); 
        
        messageDiv.innerHTML = `
            <div class="message-content">
                ${formattedText}
                <span class="message-time">${time}</span>
            </div>
        `;
        
        messagesArea.appendChild(messageDiv);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function showTypingIndicator() {
        const messagesArea = document.getElementById('messagesArea');
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message ai';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `
            <div class="typing-indicator">
                <span></span><span></span><span></span>
            </div>
        `;
        messagesArea.appendChild(typingDiv);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function hideTypingIndicator() {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) indicator.remove();
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>
</body>
</html>
