<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | K-LYNX AI++</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #00ffaa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 25px;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stat-card h3 {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 36px;
            font-weight: 800;
            color: #00d4ff;
        }

        .panel {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .panel h2 {
            margin-bottom: 20px;
            color: #00d4ff;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.9);
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            margin-right: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #00ffaa);
            color: #0F172A;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffaa00, #ff6600);
            color: #0F172A;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .users-table {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        th {
            color: #00d4ff;
            font-weight: 600;
        }

        .delete-btn {
            background: rgba(255,68,68,0.2);
            border: 1px solid #ff4444;
            color: #ff8888;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .delete-btn:hover {
            background: #ff4444;
            color: white;
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-success {
            background: rgba(0, 255, 100, 0.2);
            border: 1px solid #00ff64;
            color: #88ff88;
        }

        .alert-error {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4444;
            color: #ff8888;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #00d4ff;
        }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            .panel { padding: 20px; }
            th, td { font-size: 12px; padding: 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">K-LYNX AI++ <span style="font-size:12px;">admin</span></div>
            <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        </div>

        <div id="alert" class="alert"></div>

        <div class="stats-grid" id="stats">
            <div class="stat-card">
                <h3>Total Users</h3>
                <div class="number" id="totalUsers">-</div>
            </div>
            <div class="stat-card">
                <h3>Database Status</h3>
                <div class="number" id="dbStatus">-</div>
            </div>
            <div class="stat-card">
                <h3>Last Backup</h3>
                <div class="number" id="lastBackup">-</div>
            </div>
        </div>

        <div class="panel">
            <h2><i class="fas fa-database"></i> Database Actions</h2>
            <div class="input-group">
                <label>Admin Password</label>
                <input type="password" id="adminPassword" placeholder="Enter admin password">
            </div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="btn btn-primary" onclick="backupDatabase()"><i class="fas fa-download"></i> Download Backup</button>
                <button class="btn btn-secondary" onclick="testConnection()"><i class="fas fa-plug"></i> Test Connection</button>
                <button class="btn btn-secondary" onclick="refreshUsers()"><i class="fas fa-sync"></i> Refresh Users</button>
            </div>
        </div>

        <div class="panel">
            <h2><i class="fas fa-user-minus"></i> Delete User by Email</h2>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="deleteEmail" placeholder="user@example.com">
            </div>
            <button class="btn btn-danger" onclick="deleteUser()"><i class="fas fa-trash"></i> Delete User</button>
        </div>

        <div class="panel">
            <h2><i class="fas fa-trash-alt"></i> Danger Zone</h2>
            <p style="margin-bottom: 15px; color: #ff8888;">⚠️ These actions are permanent and cannot be undone!</p>
            <button class="btn btn-warning" onclick="deleteAllUsers()"><i class="fas fa-skull-crossbones"></i> Delete ALL Users</button>
            <button class="btn btn-danger" onclick="resetDatabase()"><i class="fas fa-database"></i> Drop & Recreate Table</button>
        </div>

        <div class="panel">
            <h2><i class="fas fa-users"></i> All Users</h2>
            <div class="users-table" id="usersList">
                <div class="loading">Loading users...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://klynxai.onrender.com';
        const BACKUP_PASSWORD = prompt('Enter admin password to continue:');

        if (!BACKUP_PASSWORD) {
            window.location.href = '/';
        }

        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            alert.style.display = 'block';
            setTimeout(() => {
                alert.style.display = 'none';
            }, 4000);
        }

        async function testConnection() {
            try {
                const response = await fetch(`${API_BASE_URL}/test-db?password=${BACKUP_PASSWORD}`);
                const data = await response.json();
                if (response.ok) {
                    document.getElementById('dbStatus').innerText = 'Online';
                    showAlert('Database connected successfully!', 'success');
                } else {
                    document.getElementById('dbStatus').innerText = 'Error';
                    showAlert('Database connection failed!', 'error');
                }
            } catch (error) {
                document.getElementById('dbStatus').innerText = 'Offline';
                showAlert('Cannot connect to database!', 'error');
            }
        }

        async function backupDatabase() {
            try {
                showAlert('Starting backup download...', 'success');
                window.location.href = `${API_BASE_URL}/backup?password=${BACKUP_PASSWORD}`;
                setTimeout(() => {
                    document.getElementById('lastBackup').innerText = new Date().toLocaleTimeString();
                }, 2000);
            } catch (error) {
                showAlert('Backup failed: ' + error.message, 'error');
            }
        }

        async function refreshUsers() {
            const usersDiv = document.getElementById('usersList');
            usersDiv.innerHTML = '<div class="loading">Loading users...</div>';
            
            try {
                const response = await fetch(`${API_BASE_URL}/users`);
                const users = await response.json();
                
                document.getElementById('totalUsers').innerText = users.length;
                
                if (users.length === 0) {
                    usersDiv.innerHTML = '<p style="text-align:center; padding:20px;">No users found</p>';
                    return;
                }
                
                let html = `
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Language</th>
                                <th>Created At</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                users.forEach(user => {
                    const date = new Date(user.created_at).toLocaleDateString();
                    html += `
                        <tr>
                            <td>${user.id}</td>
                            <td>${escapeHtml(user.name)}</td>
                            <td>${escapeHtml(user.email)}</td>
                            <td>${escapeHtml(user.language || 'English')}</td>
                            <td>${date}</td>
                            <td><button class="delete-btn" onclick="deleteUserByEmail('${user.email}')">Delete</button></td>
                        </tr>
                    `;
                });
                
                html += `</tbody></table>`;
                usersDiv.innerHTML = html;
                
            } catch (error) {
                usersDiv.innerHTML = '<p style="text-align:center; padding:20px; color:#ff8888;">Error loading users</p>';
                showAlert('Failed to load users', 'error');
            }
        }

        async function deleteUser() {
            const email = document.getElementById('deleteEmail').value.trim();
            if (!email) {
                showAlert('Please enter an email address', 'error');
                return;
            }
            
            if (confirm(`Are you sure you want to delete user: ${email}?`)) {
                try {
                    const response = await fetch(`${API_BASE_URL}/delete-user?password=${BACKUP_PASSWORD}&email=${email}`, {
                        method: 'DELETE'
                    });
                    const data = await response.json();
                    
                    if (response.ok) {
                        showAlert(`Deleted user: ${email}`, 'success');
                        document.getElementById('deleteEmail').value = '';
                        refreshUsers();
                    } else {
                        showAlert(data.error || 'Delete failed', 'error');
                    }
                } catch (error) {
                    showAlert('Delete failed: ' + error.message, 'error');
                }
            }
        }

        async function deleteUserByEmail(email) {
            if (confirm(`Are you sure you want to delete user: ${email}?`)) {
                try {
                    const response = await fetch(`${API_BASE_URL}/delete-user?password=${BACKUP_PASSWORD}&email=${email}`, {
                        method: 'DELETE'
                    });
                    const data = await response.json();
                    
                    if (response.ok) {
                        showAlert(`Deleted user: ${email}`, 'success');
                        refreshUsers();
                    } else {
                        showAlert(data.error || 'Delete failed', 'error');
                    }
                } catch (error) {
                    showAlert('Delete failed: ' + error.message, 'error');
                }
            }
        }

        async function deleteAllUsers() {
            if (confirm('⚠️ WARNING: This will delete ALL users from the database! This cannot be undone! Are you sure?')) {
                if (confirm('Type "CONFIRM" to proceed:')) {
                    try {
                        const response = await fetch(`${API_BASE_URL}/delete-all-users?password=${BACKUP_PASSWORD}`, {
                            method: 'DELETE'
                        });
                        const data = await response.json();
                        
                        if (response.ok) {
                            showAlert(`Deleted ${data.deleted || 0} users`, 'success');
                            refreshUsers();
                        } else {
                            showAlert(data.error || 'Delete failed', 'error');
                        }
                    } catch (error) {
                        showAlert('Delete failed: ' + error.message, 'error');
                    }
                }
            }
        }

        async function resetDatabase() {
            if (confirm('⚠️⚠️⚠️ DANGER: This will DROP and RECREATE the users table! All data will be lost! This cannot be undone! ⚠️⚠️⚠️')) {
                if (confirm('Type "RESET DATABASE" to confirm:')) {
                    try {
                        const response = await fetch(`${API_BASE_URL}/reset-database?password=${BACKUP_PASSWORD}`, {
                            method: 'POST'
                        });
                        const data = await response.json();
                        
                        if (response.ok) {
                            showAlert('Database reset successfully!', 'success');
                            refreshUsers();
                        } else {
                            showAlert(data.error || 'Reset failed', 'error');
                        }
                    } catch (error) {
                        showAlert('Reset failed: ' + error.message, 'error');
                    }
                }
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initial load
        testConnection();
        refreshUsers();
    </script>
</body>
</html>
