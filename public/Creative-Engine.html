<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Engine | K-LYNX AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f0f12;color:#e8e8ec;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;padding:16px;max-width:500px;margin:0 auto;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,#00d4ff,#00ffaa);-webkit-background-clip:text;background-clip:text;color:transparent;}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#00d4ff,#00ffaa);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.subtitle{color:#8a8a92;margin-bottom:16px;font-size:15px;}
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;margin-bottom:16px;}
.chips::-webkit-scrollbar{display:none;}
.chip{padding:8px 16px;border:1px solid #2a2a32;border-radius:20px;background:transparent;color:#8a8a92;font-size:14px;white-space:nowrap;cursor:pointer;transition:all 0.2s;}
.chip.active{background:#6d5dfc;border-color:#6d5dfc;color:white;font-weight:600;}
.upload-area{background:#1a1a1f;border:2px dashed #2a2a32;border-radius:12px;padding:30px;text-align:center;cursor:pointer;margin-bottom:16px;transition:all 0.2s;}
.upload-area:hover{border-color:#6d5dfc;background:rgba(109,93,252,0.05);}
.upload-icon{font-size:40px;margin-bottom:8px;}
.prompt-box{background:#1a1a1f;border:1px solid #2a2a32;border-radius:12px;padding:12px;margin-bottom:16px;}
textarea{width:100%;background:transparent;border:none;color:#e8e8ec;font-size:16px;resize:none;outline:none;min-height:24px;max-height:120px;line-height:1.4;}
textarea::placeholder{color:#8a8a92;}
.prompt-actions{display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
.prompt-actions-left{display:flex;align-items:center;gap:12px;}
.prompt-actions button{background:transparent;border:1px solid #2a2a32;color:#e8e8ec;padding:6px 12px;border-radius:8px;font-size:14px;cursor:pointer;}
.char-count{font-size:12px;color:#8a8a92;}
.send-btn{background:#8B7FFF !important;border:none !important;color:white !important;font-weight:600;}
.send-btn:disabled{opacity:0.5;cursor:not-allowed;}
.output{margin:24px 0;min-height:50px;}
.output-card{background:#1a1a1f;border:1px solid #2a2a32;border-radius:12px;padding:16px;margin-bottom:12px;}
.output-img,.output-video{width:100%;border-radius:8px;margin-bottom:12px;max-height:300px;object-fit:contain;}
.output-text,.output-code{white-space:pre-wrap;line-height:1.6;margin-bottom:12px;font-size:14px;}
.output-code{background:#0d0d0d;padding:12px;border-radius:8px;font-family:'Courier New',monospace;font-size:12px;overflow-x:auto;}
.output-actions{display:flex;gap:8px;flex-wrap:wrap;}
.output-actions button{flex:1;min-width:80px;background:#25252c;border:1px solid #2a2a32;color:#e8e8ec;padding:8px;border-radius:8px;font-size:13px;cursor:pointer;}
.output-actions button:hover{background:#6d5dfc;color:white;}
.edit-tools{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0;}
.edit-btn{padding:6px 12px;background:#25252c;border:1px solid #2a2a32;border-radius:20px;font-size:12px;cursor:pointer;}
.edit-btn:hover{background:#6d5dfc;}
.recent{margin-top:32px;}
.recent h3{font-size:16px;margin-bottom:12px;color:#8a8a92;}
.recent-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.recent-item{aspect-ratio:1;background:#1a1a1f;border-radius:8px;border:1px solid #2a2a32;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;overflow:hidden;flex-direction:column;font-size:12px;text-align:center;}
.recent-item img{width:100%;height:100%;object-fit:cover;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:#1a1a1f;border:1px solid #2a2a32;padding:12px 20px;border-radius:8px;font-size:14px;transition:transform 0.3s ease;z-index:200;}
.toast.show{transform:translateX(-50%) translateY(0);}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center;z-index:1000;}
.modal-content{background:#1a1a1f;padding:24px;border-radius:16px;width:90%;max-width:350px;border:1px solid #2a2a32;}
.modal-content h3{margin-bottom:16px;}
.modal-content select{width:100%;padding:10px;background:#25252c;border:1px solid #2a2a32;border-radius:8px;color:white;margin-bottom:16px;}
.modal-buttons{display:flex;gap:12px;}
.modal-buttons button{flex:1;padding:10px;border-radius:8px;cursor:pointer;border:none;}
.modal-buttons button:first-child{background:#6d5dfc;color:white;}
.modal-buttons button:last-child{background:#25252c;color:white;}
.loading{text-align:center;padding:40px;}
.spinner{width:40px;height:40px;border:3px solid #2a2a32;border-top-color:#6d5dfc;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);display:flex;justify-content:center;align-items:center;z-index:9999;flex-direction:column;}
.loading-overlay .spinner{width:50px;height:50px;}
.loading-overlay p{margin-top:16px;color:#6d5dfc;}
.language-select{background:#25252c;border:1px solid #2a2a32;border-radius:8px;padding:6px 12px;color:white;margin-left:8px;}
.back-btn{position:fixed;top:20px;left:20px;display:flex;align-items:center;gap:5px;padding:8px 15px;background:rgba(0,0,0,0.3);border:1px solid rgba(0,212,255,0.5);border-radius:20px;color:white;cursor:pointer;font-size:14px;z-index:1000;text-decoration:none;}
.back-btn:hover{background:rgba(0,212,255,0.2);}
</style>
</head>
<body>
<a href="/" class="back-btn"><span>←</span><span>Back</span></a>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div><p>Loading...</p></div>

<div id="mainContent" style="display:none;">
<div class="header">
  <h1>🎨 Creative Engine</h1>
  <div class="avatar" onclick="logout()">👤</div>
</div>
<p class="subtitle">Create images, videos, poetry, or code</p>

<div class="chips" id="modeChips">
  <button class="chip active" data-mode="image">🎨 Image</button>
  <button class="chip" data-mode="video">🎬 Video</button>
  <button class="chip" data-mode="poetry">🪶 Poetry</button>
  <button class="chip" data-mode="code">💻 Code</button>
</div>

<div id="uploadSection" class="upload-area">
  <div class="upload-icon">📤</div>
  <div>Click to upload image/video</div>
  <div style="font-size:12px;color:#8a8a92;margin-top:4px;">JPG, PNG, GIF, MP4, MOV</div>
  <input type="file" id="fileInput" accept="image/*,video/*" style="display:none;">
</div>

<div class="prompt-box">
  <textarea id="prompt" rows="1" placeholder="Describe what you want to create..." maxlength="500"></textarea>
  <div class="prompt-actions">
    <div class="prompt-actions-left">
      <span class="char-count" id="charCount">0/500</span>
      <select id="codeLanguage" class="language-select" style="display:none;">
        <option value="javascript">JavaScript</option>
        <option value="python">Python</option>
        <option value="html">HTML/CSS</option>
        <option value="java">Java</option>
        <option value="cpp">C++</option>
        <option value="go">Go</option>
        <option value="rust">Rust</option>
        <option value="sql">SQL</option>
      </select>
    </div>
    <button class="send-btn" id="sendBtn">✨ Generate</button>
  </div>
</div>

<div id="output" class="output"></div>

<div class="recent">
  <h3>📁 Recent Creations</h3>
  <div class="recent-grid" id="recentGrid"></div>
</div>
</div>

<div id="toast" class="toast"></div>
<div class="modal" id="filterModal"><div class="modal-content"><h3>🎨 Apply Filter</h3><select id="filterSelect"><option value="vintage">Vintage</option><option value="cinematic">Cinematic</option><option value="cartoon">Cartoon</option><option value="oil-painting">Oil Painting</option><option value="watercolor">Watercolor</option><option value="neon">Neon Glow</option><option value="black-white">Black & White</option></select><div class="modal-buttons"><button onclick="applyFilter()">Apply</button><button onclick="closeFilterModal()">Cancel</button></div></div></div>

<script>
const API_URL = 'https://jai1-sh81.onrender.com';
let clientId = localStorage.getItem('klynx_client_id');
if (!clientId) { clientId = 'klynx_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9); localStorage.setItem('klynx_client_id', clientId); }

// Auth check
const token = localStorage.getItem('token');
const user = localStorage.getItem('user');
const loadingOverlay = document.getElementById('loadingOverlay');
const mainContent = document.getElementById('mainContent');

if (!token && !user) {
  loadingOverlay.style.display = 'flex';
  setTimeout(() => { window.location.href = '/login.html'; }, 1000);
} else {
  loadingOverlay.style.display = 'none';
  mainContent.style.display = 'block';
  // Notify JAI that user entered Creative Engine
  fetch(`${API_URL}/api/chat`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: 'entering Creative Engine', clientId, options: { speech: false } })
  }).catch(e => console.log);
}

let currentMode = 'image';
let currentMediaUrl = '';
let currentFile = null;
let history = JSON.parse(localStorage.getItem('creative_history') || '[]');
let isGenerating = false;
let lastGeneratedText = '';
let lastGeneratedCode = '';

const promptEl = document.getElementById('prompt');
const sendBtn = document.getElementById('sendBtn');
const outputEl = document.getElementById('output');
const fileInput = document.getElementById('fileInput');
const uploadSection = document.getElementById('uploadSection');
const charCountEl = document.getElementById('charCount');
const codeLanguageSelect = document.getElementById('codeLanguage');

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

function updateCharCount() {
  const len = promptEl.value.length;
  charCountEl.textContent = `${len}/500`;
  sendBtn.disabled = len === 0 && !currentFile && currentMode !== 'poetry' && currentMode !== 'code';
}
promptEl.addEventListener('input', updateCharCount);
updateCharCount();

document.querySelectorAll('.chip').forEach(c => {
  c.onclick = () => {
    document.querySelector('.chip.active').classList.remove('active');
    c.classList.add('active');
    currentMode = c.dataset.mode;
    currentMediaUrl = '';
    currentFile = null;
    outputEl.innerHTML = '';
    
    if (currentMode === 'poetry') {
      uploadSection.style.display = 'none';
      codeLanguageSelect.style.display = 'none';
      promptEl.placeholder = 'Write a poem about... (e.g., "love", "nature", "hope", "the ocean")';
      sendBtn.textContent = '✨ Write Poem';
    } else if (currentMode === 'code') {
      uploadSection.style.display = 'none';
      codeLanguageSelect.style.display = 'inline-block';
      promptEl.placeholder = 'Describe the code you want... (e.g., "a function to sort an array", "a React component for a button")';
      sendBtn.textContent = '💻 Generate Code';
    } else {
      uploadSection.style.display = 'block';
      codeLanguageSelect.style.display = 'none';
      fileInput.accept = currentMode === 'image' ? 'image/*' : 'video/*';
      promptEl.placeholder = currentMode === 'image' ? 'Describe the image you want to create...' : 'Describe the video you want to create...';
      sendBtn.textContent = '✨ Generate';
    }
    showToast(`Switched to ${currentMode} mode`);
  };
});

uploadSection.onclick = () => {
  if (currentMode !== 'poetry' && currentMode !== 'code') fileInput.click();
};
fileInput.onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  currentFile = file;
  const reader = new FileReader();
  reader.onload = (event) => {
    currentMediaUrl = event.target.result;
    outputEl.innerHTML = `
      <div class="output-card">
        ${currentMode === 'image' ? `<img src="${currentMediaUrl}" class="output-img" id="previewMedia">` : `<video src="${currentMediaUrl}" class="output-video" controls id="previewMedia"></video>`}
        <div class="edit-tools">
          <button class="edit-btn" onclick="applyEdit('make brighter')">☀️ Brighten</button>
          <button class="edit-btn" onclick="applyEdit('make darker')">🌙 Darken</button>
          <button class="edit-btn" onclick="applyEdit('add more contrast')">🎨 Contrast</button>
          <button class="edit-btn" onclick="applyEdit('make more colorful')">🌈 Colorful</button>
          <button class="edit-btn" onclick="applyEdit('make black and white')">⚫ B&W</button>
          <button class="edit-btn" onclick="openFilterModal()">🎨 Filters</button>
          <button class="edit-btn" onclick="applyEdit('crop to square')">⬛ Crop Square</button>
          <button class="edit-btn" onclick="applyEdit('rotate 90 degrees')">🔄 Rotate</button>
        </div>
        <div class="output-actions">
          <button onclick="downloadMedia()">💾 Download</button>
          <button onclick="copyMedia()">📋 Copy</button>
          <button onclick="clearMedia()">🗑️ Clear</button>
        </div>
      </div>
    `;
    showToast(`${currentMode} uploaded! You can now edit it.`);
  };
  reader.readAsDataURL(file);
};

async function applyEdit(editType) {
  if (!currentMediaUrl) { showToast('No media to edit'); return; }
  showToast(`Applying: ${editType}...`);
  await new Promise(r => setTimeout(r, 800));
  showToast(`Applied: ${editType}`);
}
window.applyEdit = applyEdit;

async function callJAI(message) {
  try {
    const response = await fetch(`${API_URL}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: message, clientId: clientId, options: { speech: false } })
    });
    const data = await response.json();
    return data.response || "Sorry, I couldn't generate that.";
  } catch (error) {
    return "Error connecting to JAI. Please try again.";
  }
}

async function generatePoetry() {
  const prompt = promptEl.value.trim();
  if (!prompt) { showToast('Please enter a poem topic'); return; }
  
  isGenerating = true;
  sendBtn.disabled = true;
  sendBtn.textContent = '⏳ Writing...';
  outputEl.innerHTML = '<div class="loading"><div class="spinner"></div><div>Writing your poem...</div></div>';
  
  const jaiPrompt = `Write a beautiful, emotional poem about ${prompt}. Make it heartfelt and expressive. Use proper line breaks.`;
  const result = await callJAI(jaiPrompt);
  lastGeneratedText = result;
  
  outputEl.innerHTML = `
    <div class="output-card">
      <div class="output-text">${escapeHtml(result).replace(/\n/g, '<br>')}</div>
      <div class="output-actions">
        <button onclick="copyText()">📋 Copy</button>
        <button onclick="downloadText()">💾 Download</button>
        <button onclick="speakText()">🔊 Listen</button>
        <button onclick="regeneratePoetry()">🔄 Regenerate</button>
      </div>
    </div>
  `;
  
  history.unshift({ prompt: prompt, mode: 'poetry', text: result, timestamp: Date.now() });
  history = history.slice(0, 12);
  localStorage.setItem('creative_history', JSON.stringify(history));
  renderRecent();
  
  sendBtn.disabled = false;
  sendBtn.textContent = '✨ Write Poem';
  isGenerating = false;
  showToast('Poem generated!');
}

async function generateCode() {
  const prompt = promptEl.value.trim();
  const language = codeLanguageSelect.value;
  if (!prompt) { showToast('Please enter a code description'); return; }
  
  isGenerating = true;
  sendBtn.disabled = true;
  sendBtn.textContent = '⏳ Generating Code...';
  outputEl.innerHTML = '<div class="loading"><div class="spinner"></div><div>Writing your code...</div></div>';
  
  const jaiPrompt = `Write ${language} code for: ${prompt}. Include comments explaining what the code does. Make it clean and well-formatted.`;
  const result = await callJAI(jaiPrompt);
  lastGeneratedCode = result;
  
  outputEl.innerHTML = `
    <div class="output-card">
      <div class="output-code">${escapeHtml(result).replace(/\n/g, '<br>')}</div>
      <div class="output-actions">
        <button onclick="copyCode()">📋 Copy</button>
        <button onclick="downloadCode()">💾 Download</button>
        <button onclick="regenerateCode()">🔄 Regenerate</button>
      </div>
    </div>
  `;
  
  history.unshift({ prompt: prompt, mode: 'code', language: language, text: result, timestamp: Date.now() });
  history = history.slice(0, 12);
  localStorage.setItem('creative_history', JSON.stringify(history));
  renderRecent();
  
  sendBtn.disabled = false;
  sendBtn.textContent = '💻 Generate Code';
  isGenerating = false;
  showToast('Code generated!');
}

async function generateImage() {
  const prompt = promptEl.value.trim();
  if (!prompt && !currentFile) { showToast('Please enter a prompt or upload an image'); return; }
  
  isGenerating = true;
  sendBtn.disabled = true;
  sendBtn.textContent = '⏳ Generating...';
  outputEl.innerHTML = '<div class="loading"><div class="spinner"></div><div>Creating your image...</div></div>';
  
  await new Promise(r => setTimeout(r, 2000));
  const randomId = Date.now();
  const imageUrl = `https://picsum.photos/400?random=${randomId}`;
  currentMediaUrl = imageUrl;
  
  outputEl.innerHTML = `
    <div class="output-card">
      <img src="${imageUrl}" class="output-img" id="resultMedia">
      <div class="edit-tools">
        <button class="edit-btn" onclick="applyEdit('make brighter')">☀️ Brighten</button>
        <button class="edit-btn" onclick="applyEdit('make darker')">🌙 Darken</button>
        <button class="edit-btn" onclick="applyEdit('add more contrast')">🎨 Contrast</button>
        <button class="edit-btn" onclick="applyEdit('make more colorful')">🌈 Colorful</button>
        <button class="edit-btn" onclick="applyEdit('make black and white')">⚫ B&W</button>
        <button class="edit-btn" onclick="openFilterModal()">🎨 Filters</button>
      </div>
      <div class="output-actions">
        <button onclick="downloadMedia()">💾 Download</button>
        <button onclick="copyMedia()">📋 Copy</button>
        <button onclick="regenerateImage()">🔄 Regenerate</button>
      </div>
    </div>
  `;
  
  history.unshift({ prompt: prompt || 'Generated image', mode: 'image', url: imageUrl, timestamp: Date.now() });
  history = history.slice(0, 12);
  localStorage.setItem('creative_history', JSON.stringify(history));
  renderRecent();
  
  sendBtn.disabled = false;
  sendBtn.textContent = '✨ Generate';
  isGenerating = false;
  showToast('Image generated!');
}

async function generateVideo() {
  const prompt = promptEl.value.trim();
  if (!prompt && !currentFile) { showToast('Please enter a prompt or upload a video'); return; }
  
  isGenerating = true;
  sendBtn.disabled = true;
  sendBtn.textContent = '⏳ Generating...';
  outputEl.innerHTML = '<div class="loading"><div class="spinner"></div><div>Creating your video...</div></div>';
  
  await new Promise(r => setTimeout(r, 2000));
  const videoUrl = `https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4`;
  currentMediaUrl = videoUrl;
  
  outputEl.innerHTML = `
    <div class="output-card">
      <video src="${videoUrl}" class="output-video" controls autoplay id="resultMedia"></video>
      <div class="output-actions">
        <button onclick="downloadMedia()">💾 Download</button>
        <button onclick="copyMedia()">📋 Copy</button>
        <button onclick="regenerateVideo()">🔄 Regenerate</button>
      </div>
    </div>
  `;
  
  history.unshift({ prompt: prompt || 'Generated video', mode: 'video', url: videoUrl, timestamp: Date.now() });
  history = history.slice(0, 12);
  localStorage.setItem('creative_history', JSON.stringify(history));
  renderRecent();
  
  sendBtn.disabled = false;
  sendBtn.textContent = '✨ Generate';
  isGenerating = false;
  showToast('Video generated!');
}

async function generate() {
  if (currentMode === 'poetry') await generatePoetry();
  else if (currentMode === 'code') await generateCode();
  else if (currentMode === 'image') await generateImage();
  else if (currentMode === 'video') await generateVideo();
}

function regenerateImage() { generateImage(); }
function regenerateVideo() { generateVideo(); }
function regeneratePoetry() { generatePoetry(); }
function regenerateCode() { generateCode(); }
window.regenerateImage = regenerateImage;
window.regenerateVideo = regenerateVideo;
window.regeneratePoetry = regeneratePoetry;
window.regenerateCode = regenerateCode;

function downloadMedia() {
  if (!currentMediaUrl) { showToast('No media to download'); return; }
  const link = document.createElement('a');
  link.download = `${currentMode}-${Date.now()}.${currentMode === 'image' ? 'png' : 'mp4'}`;
  link.href = currentMediaUrl;
  link.click();
  showToast('Download started');
}
window.downloadMedia = downloadMedia;

async function copyMedia() {
  if (!currentMediaUrl) { showToast('No media to copy'); return; }
  try {
    const blob = await fetch(currentMediaUrl).then(r => r.blob());
    await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
    showToast('Copied to clipboard');
  } catch(e) { showToast('Copy failed'); }
}
window.copyMedia = copyMedia;

function clearMedia() {
  currentMediaUrl = '';
  currentFile = null;
  fileInput.value = '';
  outputEl.innerHTML = '';
  showToast('Media cleared');
}
window.clearMedia = clearMedia;

function copyText() {
  if (lastGeneratedText) {
    navigator.clipboard.writeText(lastGeneratedText);
    showToast('Poem copied!');
  }
}
window.copyText = copyText;

function copyCode() {
  if (lastGeneratedCode) {
    navigator.clipboard.writeText(lastGeneratedCode);
    showToast('Code copied!');
  }
}
window.copyCode = copyCode;

function downloadText() {
  if (lastGeneratedText) {
    const blob = new Blob([lastGeneratedText], {type: 'text/plain'});
    const link = document.createElement('a');
    link.download = `poem-${Date.now()}.txt`;
    link.href = URL.createObjectURL(blob);
    link.click();
    URL.revokeObjectURL(link.href);
    showToast('Downloaded!');
  }
}
window.downloadText = downloadText;

function downloadCode() {
  if (lastGeneratedCode) {
    const blob = new Blob([lastGeneratedCode], {type: 'text/plain'});
    const link = document.createElement('a');
    const lang = codeLanguageSelect.value;
    link.download = `code-${Date.now()}.${lang === 'python' ? 'py' : lang === 'javascript' ? 'js' : lang === 'html' ? 'html' : 'txt'}`;
    link.href = URL.createObjectURL(blob);
    link.click();
    URL.revokeObjectURL(link.href);
    showToast('Downloaded!');
  }
}
window.downloadCode = downloadCode;

function speakText() {
  if (lastGeneratedText) {
    const utterance = new SpeechSynthesisUtterance(lastGeneratedText);
    utterance.rate = 0.9;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utterance);
    showToast('Speaking...');
  }
}
window.speakText = speakText;

function openFilterModal() { document.getElementById('filterModal').style.display = 'flex'; }
function closeFilterModal() { document.getElementById('filterModal').style.display = 'none'; }
window.openFilterModal = openFilterModal;
window.closeFilterModal = closeFilterModal;

function applyFilter() {
  const filter = document.getElementById('filterSelect').value;
  closeFilterModal();
  applyEdit(`apply ${filter} filter`);
}
window.applyFilter = applyFilter;

function renderRecent() {
  const grid = document.getElementById('recentGrid');
  if (history.length === 0) {
    grid.innerHTML = '<div class="recent-item">✨<br>Your<br>creations</div><div class="recent-item"></div><div class="recent-item"></div><div class="recent-item"></div>';
    return;
  }
  grid.innerHTML = history.slice(0, 8).map(item => {
    if (item.mode === 'image' && item.url) {
      return `<div class="recent-item" onclick="loadRecent('${item.url}', '${item.mode}')"><img src="${item.url}"></div>`;
    } else if (item.mode === 'video' && item.url) {
      return `<div class="recent-item" onclick="loadRecent('${item.url}', '${item.mode}')">🎬</div>`;
    } else {
      return `<div class="recent-item" onclick="loadRecentText('${escapeHtml(item.text).substring(0, 50)}', '${item.mode}')">${item.mode === 'poetry' ? '🪶' : '💻'}</div>`;
    }
  }).join('');
}

function loadRecent(url, mode) {
  currentMode = mode;
  currentMediaUrl = url;
  document.querySelector('.chip.active').classList.remove('active');
  document.querySelector(`.chip[data-mode="${mode}"]`).classList.add('active');
  outputEl.innerHTML = `
    <div class="output-card">
      ${mode === 'image' ? `<img src="${url}" class="output-img">` : `<video src="${url}" class="output-video" controls></video>`}
      <div class="output-actions">
        <button onclick="downloadMedia()">💾 Download</button>
        <button onclick="copyMedia()">📋 Copy</button>
        <button onclick="clearMedia()">🗑️ Clear</button>
      </div>
    </div>
  `;
  showToast(`Loaded ${mode} from recent`);
}

function loadRecentText(text, mode) {
  currentMode = mode;
  if (mode === 'poetry') lastGeneratedText = text;
  else lastGeneratedCode = text;
  document.querySelector('.chip.active').classList.remove('active');
  document.querySelector(`.chip[data-mode="${mode}"]`).classList.add('active');
  const displayText = mode === 'code' ? 
    `<div class="output-code">${escapeHtml(text).replace(/\n/g, '<br>')}</div>` :
    `<div class="output-text">${escapeHtml(text).replace(/\n/g, '<br>')}</div>`;
  outputEl.innerHTML = `
    <div class="output-card">
      ${displayText}
      <div class="output-actions">
        <button onclick="${mode === 'poetry' ? 'copyText()' : 'copyCode()'}">📋 Copy</button>
        <button onclick="${mode === 'poetry' ? 'downloadText()' : 'downloadCode()'}">💾 Download</button>
        ${mode === 'poetry' ? '<button onclick="speakText()">🔊 Listen</button>' : ''}
      </div>
    </div>
  `;
  showToast(`Loaded ${mode} from recent`);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function logout() { 
  localStorage.removeItem('token'); 
  localStorage.removeItem('user'); 
  window.location.href = '/login.html'; 
}

sendBtn.onclick = generate;
renderRecent();
updateCharCount();
</script>
</body>
</html>
